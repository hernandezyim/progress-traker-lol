<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SUPRO Tracker</title>
    <link
      rel="icon"
      type="image/png"
      href="https://res.cloudinary.com/dfr9zlu8d/image/upload/v1777329733/supro-logo_rvavuy.jpg"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      :root {
        --bg: #090909;
        --panel: #121214;
        --panel2: #1a1a1f;
        --line: #2a2a32;
        --text: #f5f5f7;
        --muted: #9e9ea8;
        --gold: #ff5454;
        --green: #57f287;
        --red: #ff5b5b;
        --blue: #8ab4ff;
        --amber: #ff8a4c;
      }
      body {
        background:
          radial-gradient(
            circle at top,
            rgba(255, 55, 55, 0.08),
            transparent 24%
          ),
          linear-gradient(180deg, #0b0b0d, #090909);
        background-attachment: fixed;
        color: var(--text);
        padding-bottom: 84px;
      }
      .wrap {
        max-width: 1100px;
        margin: 0 auto;
        padding: 16px;
      }
      .header {
        position: sticky;
        top: 0;
        z-index: 20;
        background: rgba(10, 13, 20, 0.94);
        backdrop-filter: blur(12px);
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        padding: 12px 16px;
        margin: -16px -16px 16px;
        border-bottom: 1px solid rgba(255, 91, 91, 0.16);
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .brand-logo {
        width: 48px;
        height: 48px;
        border-radius: 14px;
        object-fit: cover;
        border: 1px solid rgba(255, 91, 91, 0.28);
        box-shadow: 0 0 18px rgba(255, 91, 91, 0.18);
      }
      .brand b {
        display: block;
        font-size: 18px;
        letter-spacing: 0.08em;
      }
      .brand span {
        display: none;
      }
      .header-actions {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }
      .menu-btn {
        display: none;
        width: 44px;
        height: 44px;
        border-radius: 14px;
        border: 1px solid rgba(255, 91, 91, 0.18);
        background: var(--panel);
        color: var(--text);
        align-items: center;
        justify-content: center;
        cursor: pointer;
        position: relative;
        z-index: 45;
      }
      .menu-btn svg {
        flex-shrink: 0;
      }
      .discord-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 14px;
        border-radius: 999px;
        border: 1px solid rgba(255, 91, 91, 0.22);
        background: linear-gradient(
          135deg,
          rgba(143, 16, 24, 0.92),
          rgba(255, 77, 77, 0.88)
        );
        color: #fff;
        font-size: 12px;
        font-weight: 900;
        letter-spacing: 0.04em;
        text-decoration: none;
        box-shadow: 0 8px 20px rgba(255, 77, 77, 0.16);
      }
      .discord-btn svg {
        flex-shrink: 0;
      }
      .chip {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 6px 10px;
        border-radius: 999px;
        background: var(--panel);
        border: 1px solid var(--line);
        font-size: 11px;
        font-weight: 800;
        text-align: center;
      }
      .chip.profile {
        min-width: auto;
        justify-content: center;
        gap: 8px;
        padding: 6px 14px;
        font-size: 13px;
      }
      .mini-select {
        appearance: none;
        background: var(--panel);
        color: var(--text);
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 10px 14px;
        font-size: 12px;
        font-weight: 800;
      }
      .icon-btn {
        width: 42px;
        height: 42px;
        border-radius: 999px;
        background: var(--panel);
        color: var(--text);
        border: 1px solid var(--line);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }
      .grid {
        display: grid;
        gap: 14px;
      }
      .g2 {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .g3 {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
      .g4 {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
      .card {
        background: linear-gradient(180deg, var(--panel), #0f1422);
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 16px;
      }
      .hero {
        border-color: rgba(215, 171, 82, 0.25);
        background:
          radial-gradient(
            circle at top right,
            rgba(248, 113, 113, 0.16),
            transparent 25%
          ),
          linear-gradient(135deg, #17120e, #101828);
      }
      .title {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        margin-bottom: 12px;
      }
      .title h2 {
        font-size: 13px;
        color: #ff6b6b;
        text-transform: uppercase;
        letter-spacing: 0.16em;
        font-variant-caps: all-small-caps;
      }
      .title span {
        font-size: 12px;
        color: var(--muted);
      }
      .hero h3 {
        font-size: 28px;
        line-height: 1.08;
        margin-bottom: 10px;
      }
      .hero p,
      .note,
      .meta,
      .small {
        font-size: 13px;
        color: var(--muted);
        line-height: 1.55;
      }
      .kpi {
        background: var(--panel2);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 14px;
      }
      .kpi .v {
        font-size: 28px;
        font-weight: 900;
      }
      .kpi .l {
        font-size: 11px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-top: 4px;
      }
      .hero-grid {
        display: grid;
        grid-template-columns: 1.4fr 0.6fr;
        gap: 16px;
        align-items: center;
      }
      .hero-mark {
        width: 100%;
        max-width: 280px;
        justify-self: end;
        border-radius: 24px;
        border: 1px solid rgba(248, 113, 113, 0.24);
        box-shadow: 0 0 30px rgba(248, 113, 113, 0.14);
      }
      .form {
        display: grid;
        grid-template-columns: repeat(12, minmax(0, 1fr));
        gap: 10px;
      }
      .f {
        display: grid;
        gap: 0;
        align-content: start;
      }
      .f label {
        font-size: 10px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 0;
        line-height: 1;
      }
      .compact-field label {
        align-self: start;
        padding-bottom: 0;
      }
      .f input,
      .f select,
      .f textarea {
        width: 100%;
        padding: 8px 10px;
        background: var(--panel2);
        border: 1px solid var(--line);
        border-radius: 12px;
        color: var(--text);
        font-size: 12px;
        outline: none;
        min-height: 38px;
        line-height: 1.2;
        margin-top: 0 !important;
      }
      .f input:not([type='checkbox']):not([type='radio']),
      .f select {
        height: 38px;
      }
      .compact-field input,
      .compact-field select {
        padding: 8px 10px;
        min-height: 38px;
        height: 38px;
        font-size: 12px;
      }
      .f textarea {
        min-height: 86px;
        height: auto;
        resize: vertical;
      }
      .f select[multiple] {
        min-height: 180px;
      }
      .s2 {
        grid-column: span 2;
      }
      .s3 {
        grid-column: span 3;
      }
      .s4 {
        grid-column: span 4;
      }
      .s5 {
        grid-column: span 5;
      }
      .s6 {
        grid-column: span 6;
      }
      .s8 {
        grid-column: span 8;
      }
      .s12 {
        grid-column: span 12;
      }
      .seg,
      .toggles,
      .bars,
      .list,
      .checks,
      .guide {
        display: grid;
        gap: 10px;
      }
      .seg {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .seg button,
      .nav button,
      .btn,
      .soft,
      .danger {
        cursor: pointer;
        border: none;
      }
      .seg button {
        padding: 14px;
        border-radius: 14px;
        background: var(--panel2);
        border: 2px solid var(--line);
        font-weight: 900;
        color: var(--muted);
      }
      .seg button.active.win {
        background: rgba(74, 222, 128, 0.1);
        border-color: rgba(74, 222, 128, 0.45);
        color: var(--green);
      }
      .seg button.active.loss {
        background: rgba(248, 113, 113, 0.1);
        border-color: rgba(248, 113, 113, 0.45);
        color: var(--red);
      }
      .toggles {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .toggle {
        min-height: 88px;
        padding: 12px;
        border-radius: 16px;
        background: var(--panel2);
        border: 2px solid var(--line);
      }
      .toggle .q {
        font-size: 12px;
        line-height: 1.35;
      }
      .toggle .a {
        font-size: 22px;
        font-weight: 900;
        color: var(--muted);
        margin-top: 10px;
      }
      .toggle.goodYes,
      .toggle.goodNo {
        border-color: rgba(74, 222, 128, 0.45);
        background: rgba(74, 222, 128, 0.08);
      }
      .toggle.goodYes .a,
      .toggle.goodNo .a {
        color: var(--green);
      }
      .toggle.badYes,
      .toggle.badNo {
        border-color: rgba(248, 113, 113, 0.45);
        background: rgba(248, 113, 113, 0.08);
      }
      .toggle.badYes .a,
      .toggle.badNo .a {
        color: var(--red);
      }
      .btn,
      .soft,
      .danger {
        padding: 12px 14px;
        border-radius: 12px;
        font-weight: 900;
      }
      .btn {
        background: linear-gradient(135deg, #8f1018, #ff4d4d);
        color: #fff;
      }
      .btn.cta {
        box-shadow: 0 10px 24px rgba(255, 77, 77, 0.22);
        transform: translateY(-1px);
      }
      .soft {
        background: var(--panel2);
        color: var(--text);
        border: 1px solid var(--line);
      }
      .danger {
        background: #2a1015;
        color: #ffc2c2;
        border: 1px solid #5a202b;
      }
      .checkGroup {
        padding: 12px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }
      .checkGroup h4 {
        font-size: 12px;
        color: var(--gold);
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
      .check {
        display: flex;
        gap: 10px;
        padding: 10px;
        border-radius: 12px;
      }
      .check.on {
        background: rgba(74, 222, 128, 0.08);
        border: 1px solid rgba(74, 222, 128, 0.18);
      }
      .dot {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        border: 2px solid var(--line);
        display: grid;
        place-items: center;
        flex: 0 0 auto;
        font-size: 11px;
        font-weight: 900;
        color: #06120a;
      }
      .check.on .dot {
        background: var(--green);
        border-color: var(--green);
      }
      .check b {
        font-size: 13px;
        display: block;
      }
      .check span {
        font-size: 11px;
        color: var(--muted);
        display: block;
        margin-top: 2px;
        line-height: 1.35;
      }
      .barRow {
        display: grid;
        gap: 6px;
      }
      .barHead {
        display: flex;
        justify-content: space-between;
        gap: 10px;
      }
      .barHead span:first-child {
        font-size: 13px;
      }
      .barHead span:last-child {
        font-size: 12px;
        color: var(--muted);
      }
      .barWrap {
        height: 10px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.06);
        overflow: hidden;
      }
      .bar {
        height: 100%;
        border-radius: 999px;
        background: linear-gradient(90deg, #d7ab52, #f2d48f);
      }
      .bar.green {
        background: linear-gradient(90deg, #34d399, #86efac);
      }
      .bar.red {
        background: linear-gradient(90deg, #fb7185, #fca5a5);
      }
      .bar.blue {
        background: linear-gradient(90deg, #60a5fa, #93c5fd);
      }
      .bar.amber {
        background: linear-gradient(90deg, #f59e0b, #fcd34d);
      }
      .game {
        padding: 14px;
        border-radius: 16px;
        background: var(--panel2);
        border: 1px solid var(--line);
      }
      .gameTop {
        display: grid;
        grid-template-columns: auto 1fr auto;
        gap: 12px;
        align-items: center;
      }
      .res {
        min-width: 76px;
        height: 48px;
        padding: 0 10px;
        border-radius: 14px;
        display: grid;
        place-items: center;
        font-size: 11px;
        font-weight: 900;
        text-align: center;
      }
      .res.win {
        background: rgba(74, 222, 128, 0.1);
        border: 1px solid rgba(74, 222, 128, 0.3);
        color: var(--green);
      }
      .res.loss {
        background: rgba(248, 113, 113, 0.1);
        border: 1px solid rgba(248, 113, 113, 0.3);
        color: var(--red);
      }
      .game h4 {
        font-size: 16px;
      }
      .game small {
        display: block;
        font-size: 12px;
        color: var(--muted);
        margin-top: 2px;
      }
      .score {
        font-size: 15px;
        font-weight: 900;
        color: var(--gold);
        text-align: right;
      }
      .score span {
        display: block;
        font-size: 11px;
        color: var(--muted);
      }
      .metaGrid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
        margin-top: 10px;
      }
      .meta {
        padding: 10px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }
      .guide {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .guide .card {
        padding: 14px;
      }
      .guide h4 {
        font-size: 13px;
        color: #ff6b6b;
        margin-bottom: 6px;
        font-variant-caps: all-small-caps;
        letter-spacing: 0.08em;
      }
      .match {
        padding: 12px;
        border-radius: 14px;
        background: var(--panel2);
        border: 1px solid var(--line);
        display: flex;
        justify-content: space-between;
        gap: 10px;
        align-items: center;
      }
      .match strong {
        font-size: 13px;
      }
      .match span {
        display: block;
        font-size: 11px;
        color: var(--muted);
        margin-top: 3px;
      }
      .resource {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        padding: 14px;
        border-radius: 16px;
        background: var(--panel2);
        border: 1px solid var(--line);
      }
      .sheet-toolbar {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
        margin-bottom: 14px;
      }
      .hidden-file {
        display: none;
      }
      .sheet-pills {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 14px;
      }
      .sheet-pill {
        padding: 8px 12px;
        border-radius: 999px;
        background: var(--panel2);
        border: 1px solid var(--line);
        color: var(--muted);
        cursor: pointer;
        font-size: 12px;
        font-weight: 800;
      }
      .sheet-pill.active {
        background: rgba(255, 91, 91, 0.1);
        border-color: rgba(255, 91, 91, 0.32);
        color: #ff8a8a;
      }
      .matchup-filters {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
        margin-bottom: 12px;
      }
      .matchup-filters .select-pill,
      .matchup-filters input {
        min-width: 160px;
      }
      .table-wrap {
        overflow: auto;
        border-radius: 16px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.02);
      }
      table.sheet-table {
        width: 100%;
        border-collapse: collapse;
        min-width: 760px;
      }
      .sheet-table th,
      .sheet-table td {
        padding: 14px 16px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        text-align: left;
        font-size: 14px;
        vertical-align: middle;
        line-height: 1.5;
      }
      .sheet-table th {
        position: sticky;
        top: 0;
        background: #15151b;
        color: #ff8a8a;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-size: 11px;
      }
      .matchup-champ {
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .matchup-champ img {
        width: 72px;
        height: 72px;
        border-radius: 16px;
        object-fit: cover;
        border: 1px solid rgba(255, 255, 255, 0.12);
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
      }
      .matchup-pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 90px;
        padding: 7px 14px;
        border-radius: 999px;
        font-size: 13px;
        font-weight: 900;
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
      .diff-1,
      .diff-2 {
        background: rgba(87, 242, 135, 0.12);
        color: #8cffb0;
      }
      .diff-3 {
        background: rgba(138, 180, 255, 0.12);
        color: #9fc3ff;
      }
      .diff-4 {
        background: rgba(255, 138, 76, 0.14);
        color: #ffb17c;
      }
      .diff-5,
      .diff-6,
      .diff-7,
      .diff-8,
      .diff-9,
      .diff-10 {
        background: rgba(255, 91, 91, 0.14);
        color: #ff8f8f;
      }
      .lane-top {
        background: rgba(195, 182, 255, 0.14);
        color: #d6ccff;
      }
      .lane-jg,
      .lane-jungle {
        background: rgba(87, 242, 135, 0.14);
        color: #93ffba;
      }
      .lane-mid,
      .lane-middle {
        background: rgba(138, 180, 255, 0.14);
        color: #a7c7ff;
      }
      .lane-bot,
      .lane-adc,
      .lane-bottom {
        background: rgba(255, 138, 76, 0.14);
        color: #ffc098;
      }
      .lane-supp,
      .lane-support,
      .lane-utility {
        background: rgba(255, 105, 180, 0.14);
        color: #ffb3d6;
      }
      .account {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        padding: 14px;
        border-radius: 16px;
        background: var(--panel2);
        border: 1px solid var(--line);
      }
      .account-main {
        display: flex;
        gap: 12px;
        align-items: center;
      }
      .account-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        align-items: center;
      }
      .rank-badge {
        width: 136px;
        height: 136px;
        object-fit: contain;
        transform: scale(1.45);
        transform-origin: center;
        filter: drop-shadow(0 0 18px rgba(255, 77, 77, 0.18));
      }
      .account .rank-badge {
        width: 52px;
        height: 52px;
      }
      #accountRankPreview {
        width: 160px;
        height: 160px;
      }
      #gRankPreview {
        width: 56px;
        height: 56px;
        object-fit: contain;
        transform: scale(1.35);
        transform-origin: center;
        filter: drop-shadow(0 2px 8px rgba(255, 77, 77, 0.3));
      }
      .tag {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 5px 10px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.08);
        font-size: 11px;
        color: var(--muted);
      }
      .tag.date {
        color: #ff9d5c;
      }
      .tag.win {
        color: var(--green);
      }
      .tag.loss {
        color: var(--red);
      }
      .tag.role {
        color: #c3b6ff;
      }
      .tag.rank {
        color: #ff6b6b;
      }
      .tag.metric {
        color: #9fd0ff;
      }
      .tag.mood-normal {
        color: #d1d5db;
      }
      .tag.mood-confiado {
        color: #60a5fa;
      }
      .tag.mood-emocionado {
        color: #fb7185;
      }
      .tag.mood-concentrado {
        color: #a78bfa;
      }
      .tag.mood-tilted {
        color: #ff5b5b;
      }
      .tag.mood-cansado {
        color: #94a3b8;
      }
      .tag.mood-ansioso {
        color: #f59e0b;
      }
      .tag.mood-frío {
        color: #67e8f9;
      }
      .tag.bool-yes {
        color: var(--green);
      }
      .tag.bool-no {
        color: var(--red);
      }
      .tag.lp-plus {
        color: var(--green);
      }
      .tag.lp-minus {
        color: var(--red);
      }
      .select-pill {
        appearance: none;
        background: var(--panel2);
        border: 1px solid var(--line);
        color: var(--text);

ackedJg ? 'bool-yes' : 'bool-no'}">🎯 Trackeó JG: ${g.trackedJg ? 'SÍ' : 'NO'}</span>` : ''}</div>${

          ).toLowerCase()

          ).toLowerCase()
          const diffText = String(
            diffIndex >= 0 ? (row?.[diffIndex] ?? '') : ''
          )
          const queryOk = !query || nameText.includes(query)
          const laneOk = laneFilter === 'all' || laneText === laneFilter
          const diffOk =
            diffFilter === 'all' ||
            String(Number.parseFloat(diffText) || '') === diffFilter
          return queryOk && laneOk && diffOk
        })

              </thead>
              <tbody>
                ${filteredRows
                  .map(
                    (row) =>
                      `<tr>${headers
                        .map(
                          (_, index) =>
                            `<td>${renderCell(headerKeys[index], row?.[index])}</td>`

      async function importMatchupWorkbook(event) {
        const file = event?.target?.files?.[0]
        if (!file) return
        if (typeof XLSX === 'undefined')
          return toast('No pude cargar el lector de Excel')
        try {
          const buffer = await file.arrayBuffer()
          const workbook = XLSX.read(buffer, { type: 'array' })
          const importedSheets = workbook.SheetNames.map((sheetName, index) => {
            const worksheet = workbook.Sheets[sheetName]
            const rows = XLSX.utils
              .sheet_to_json(worksheet, {
                header: 1,
                blankrows: false,
                defval: '',
              })
              .filter((row) =>
                row.some((cell) => String(cell ?? '').trim() !== '')
              )
            return {
              id: `${Date.now()}-${index}-${sheetName}`,
              workbookName: file.name,
              sheetName,
              rows,
            }
          }).filter((sheet) => sheet.rows.length)
          data.matchupSheets = [...data.matchupSheets, ...importedSheets]
          if (!data.activeMatchupId && importedSheets[0])
            data.activeMatchupId = importedSheets[0].id
          save()
          renderMatchups()
          event.target.value = ''
          toast(`${importedSheets.length} hojas importadas`)
        } catch {
          toast('No pude leer ese Excel')
        }
      }

        $('gEnemy').value =
          m.enemy || m.info?.enemyChampion || $('gEnemy').value
        $('gRole').value = m.role || m.info?.teamPosition || $('gRole').value
        $('gKills').value = m.kills ?? m.info?.kills ?? 0
        $('gDeaths').value = m.deaths ?? m.info?.deaths ?? 0
        $('gAssists').value = m.assists ?? m.info?.assists ?? 0
        $('gCs').value = m.csMin ?? m.info?.csMin ?? 0
        $('gWards').value = m.wards ?? m.info?.wardsPlaced ?? 0
        $('gPinks').value = m.pinks ?? m.info?.detectorWardsPlaced ?? 0
        const d = m.durationSec ?? m.info?.gameDuration ?? 0
        $('gDurMin').value = Math.floor(d / 60)
        $('gDurSec').value = d % 60
        toast('Campos autollenados')
      }
      function switchTab(tab) {
        if ((tab === 'partida' || tab === 'historial') && !hasActiveProfile())
          tab = 'importar'
        ;[
          'inicio',
          'partida',
          'importar',
          'historial',
          'matchups',
          'tips',
        ].forEach((t) => {
          $(`tab-${t}`).classList.toggle('hidden', t !== tab)
        })
        document
          .querySelectorAll('.nav button')
          .forEach((b) => b.classList.toggle('active', b.dataset.tab === tab))
        document
          .querySelectorAll('.mobile-nav-btn')
          .forEach((b) =>
            b.classList.toggle('active', b.dataset.mobileTab === tab)
          )
        toggleMobileMenu(false)
        if (tab === 'historial') renderHistory()
        if (tab === 'importar') renderImported()
        if (tab === 'matchups') renderMatchups()
      }
      function toggleMobileMenu(force) {
        const drawer = $('mobileDrawer')
        const trigger = document.querySelector('.menu-btn')
        if (!drawer) return
        const next =
          typeof force === 'boolean'
            ? force
            : !drawer.classList.contains('open')
        drawer.classList.toggle('open', next)
        if (trigger) trigger.setAttribute('aria-expanded', next ? 'true' : 'false')
      }
      function closeMobileMenu(event) {
        if (event?.target?.id === 'mobileDrawer') toggleMobileMenu(false)
      }
      function syncMobileMenu() {
        const profileBox = $('mobileProfile')
        const logoutBtn = $('mobileLogoutBtn')
        if (profileBox) {
          if (hasActiveProfile()) {
            profileBox.classList.add('show')
            profileBox.innerHTML = `<img src="${rankImg(data.profile.rank)}" alt=""><div><strong>${data.profile.gameName}#${data.profile.tagLine}</strong><span>${RANK_LABEL[data.profile.rank]}</span></div>`
          } else {
            profileBox.classList.remove('show')
            profileBox.innerHTML = ''
          }
        }
        if (logoutBtn)
          logoutBtn.classList.toggle('show', hasActiveProfile())
        document.querySelectorAll('.mobile-nav-btn').forEach((btn) => {
          const blocked =
            !hasActiveProfile() &&
            (btn.dataset.mobileTab === 'partida' ||
              btn.dataset.mobileTab === 'historial')
          btn.style.display = blocked ? 'none' : 'flex'
        })
      }
      function init() {
        load()
        renderBase()
        syncProfileInputs()
        seedInputs()
        renderQuick()
        renderDashboard()
        renderHistory()
        renderProgress()
        renderMatchups()
        renderAccounts()
        updateNavVisibility()
        fetchChampionList()
        document
          .querySelectorAll('.nav button')
          .forEach((b) => (b.onclick = () => switchTab(b.dataset.tab)))
        document
          .querySelectorAll('.mobile-nav-btn')
          .forEach((b) => (b.onclick = () => switchTab(b.dataset.mobileTab)))
        syncMobileMenu()
      }
      init()
    </script>
  </body>
</html>
