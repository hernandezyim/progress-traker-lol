<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SUPRO — LoL Tracker</title>
    <link
      rel="icon"
      type="image/png"
      href="https://e7.pngegg.com/pngimages/752/220/png-clipart-league-of-legends-computer-icons-riot-games-league-of-legends-game-logo-thumbnail.png"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      :root {
        --bg: #090909;
        --panel: #121214;
        --panel2: #1a1a1f;
        --line: #2a2a32;
        --text: #f5f5f7;
        --muted: #9e9ea8;
        --gold: #ff5454;
        --green: #57f287;
        --red: #ff5b5b;
        --blue: #8ab4ff;
        --amber: #ff8a4c;
      }
      body {
        background:
          radial-gradient(
            circle at top,
            rgba(255, 55, 55, 0.08),
            transparent 24%
          ),
          linear-gradient(180deg, #0b0b0d, #090909);
        background-attachment: fixed;
        color: var(--text);
        padding-bottom: 84px;
      }
      .wrap {
        max-width: 1100px;
        margin: 0 auto;
        padding: 16px;
      }
      .header {
        position: sticky;
        top: 0;
        z-index: 20;
        background: rgba(10, 13, 20, 0.94);
        backdrop-filter: blur(12px);
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        padding: 12px 16px;
        margin: -16px -16px 16px;
        border-bottom: 1px solid rgba(255, 91, 91, 0.16);
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .brand-logo {
        width: 48px;
        height: 48px;
        border-radius: 14px;
        object-fit: cover;
        border: 1px solid rgba(255, 91, 91, 0.28);
        box-shadow: 0 0 18px rgba(255, 91, 91, 0.18);
      }
      .brand b {
        display: block;
        font-size: 18px;
        letter-spacing: 0.08em;
      }
      .brand span {
        display: block;
        font-size: 10px;
        color: var(--muted);
        letter-spacing: 0.1em;
        text-transform: uppercase;
        margin-top: 1px;
      }
      .header-actions {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }
      .menu-btn {
        display: none;
        width: 44px;
        height: 44px;
        border-radius: 14px;
        border: 1px solid rgba(255, 91, 91, 0.18);
        background: var(--panel);
        color: var(--text);
        align-items: center;
        justify-content: center;
        cursor: pointer;
        position: relative;
        z-index: 45;
      }
      .menu-btn svg {
        flex-shrink: 0;
      }
      .discord-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 14px;
        border-radius: 999px;
        border: 1px solid rgba(255, 91, 91, 0.22);
        background: linear-gradient(
          135deg,
          rgba(143, 16, 24, 0.92),
          rgba(255, 77, 77, 0.88)
        );
        color: #fff;
        font-size: 12px;
        font-weight: 900;
        letter-spacing: 0.04em;
        text-decoration: none;
        box-shadow: 0 8px 20px rgba(255, 77, 77, 0.16);
      }
      .discord-btn svg {
        flex-shrink: 0;
      }
      .chip {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 6px 10px;
        border-radius: 999px;
        background: var(--panel);
        border: 1px solid var(--line);
        font-size: 11px;
        font-weight: 800;
        text-align: center;
      }
      .chip.profile {
        min-width: 0;
        max-width: 420px;
        justify-content: center;
        gap: 8px;
        padding: 6px 14px;
        font-size: 13px;
      }
      .mini-select {
        appearance: none;
        background: var(--panel);
        color: var(--text);
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 10px 14px;
        font-size: 12px;
        font-weight: 800;
      }
      .icon-btn {
        width: 42px;
        height: 42px;
        border-radius: 999px;
        background: var(--panel);
        color: var(--text);
        border: 1px solid var(--line);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }
      .grid {
        display: grid;
        gap: 14px;
      }
      .g2 {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .g3 {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
      .g4 {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
      .card {
        background: linear-gradient(180deg, var(--panel), #0f1422);
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 16px;
      }
      .hero {
        border-color: rgba(215, 171, 82, 0.25);
        background:
          radial-gradient(
            circle at top right,
            rgba(248, 113, 113, 0.16),
            transparent 25%
          ),
          linear-gradient(135deg, #17120e, #101828);
      }
      .title {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        margin-bottom: 12px;
      }
      .title h2 {
        font-size: 13px;
        color: #ff6b6b;
        text-transform: uppercase;
        letter-spacing: 0.16em;
        font-variant-caps: all-small-caps;
      }
      .title span {
        font-size: 12px;
        color: var(--muted);
      }
      .hero h3 {
        font-size: 28px;
        line-height: 1.08;
        margin-bottom: 10px;
      }
      .hero p,
      .note,
      .meta,
      .small {
        font-size: 13px;
        color: var(--muted);
        line-height: 1.55;
      }
      .kpi {
        background: var(--panel2);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 14px;
      }
      .kpi .v {
        font-size: 28px;
        font-weight: 900;
      }
      .kpi .l {
        font-size: 11px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-top: 4px;
      }
      .hero-grid {
        display: grid;
        grid-template-columns: 1.4fr 0.6fr;
        gap: 16px;
        align-items: center;
      }
      .hero-mark {
        width: 100%;
        max-width: 280px;
        justify-self: end;
        border-radius: 24px;
        border: 1px solid rgba(248, 113, 113, 0.24);
        box-shadow: 0 0 30px rgba(248, 113, 113, 0.14);
      }
      .form {
        display: grid;
        grid-template-columns: repeat(12, minmax(0, 1fr));
        gap: 10px;
      }
      .f {
        display: grid;
        gap: 0;
        align-content: start;
      }
      .f label {
        font-size: 10px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 0;
        line-height: 1;
      }
      .compact-field label {
        align-self: start;
        padding-bottom: 0;
      }
      .f input,
      .f select,
      .f textarea {
        width: 100%;
        padding: 8px 10px;
        background: var(--panel2);
        border: 1px solid var(--line);
        border-radius: 12px;
        color: var(--text);
        font-size: 12px;
        outline: none;
        min-height: 38px;
        line-height: 1.2;
        margin-top: 0 !important;
      }
      .f input:not([type='checkbox']):not([type='radio']),
      .f select {
        height: 38px;
      }
      .compact-field input,
      .compact-field select {
        padding: 8px 10px;
        min-height: 38px;
        height: 38px;
        font-size: 12px;
      }
      .f textarea {
        min-height: 86px;
        height: auto;
        resize: vertical;
      }
      .f select[multiple] {
        min-height: 180px;
      }
      .s2 {
        grid-column: span 2;
      }
      .s3 {
        grid-column: span 3;
      }
      .s4 {
        grid-column: span 4;
      }
      .s5 {
        grid-column: span 5;
      }
      .s6 {
        grid-column: span 6;
      }
      .s8 {
        grid-column: span 8;
      }
      .s12 {
        grid-column: span 12;
      }
      .seg,
      .toggles,
      .bars,
      .list,
      .checks,
      .guide {
        display: grid;
        gap: 10px;
      }
      .seg {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .seg button,
      .nav button,
      .btn,
      .soft,
      .danger {
        cursor: pointer;
        border: none;
      }
      .seg button {
        padding: 14px;
        border-radius: 14px;
        background: var(--panel2);
        border: 2px solid var(--line);
        font-weight: 900;
        color: var(--muted);
      }
      .seg button.active.win {
        background: rgba(74, 222, 128, 0.1);
        border-color: rgba(74, 222, 128, 0.45);
        color: var(--green);
      }
      .seg button.active.loss {
        background: rgba(248, 113, 113, 0.1);
        border-color: rgba(248, 113, 113, 0.45);
        color: var(--red);
      }
      .toggles {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .toggle {
        min-height: 88px;
        padding: 12px;
        border-radius: 16px;
        background: var(--panel2);
        border: 2px solid var(--line);
      }
      .toggle .q {
        font-size: 12px;
        line-height: 1.35;
      }
      .toggle-actions {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
        margin-top: 12px;
      }
      .toggle-btn {
        min-height: 44px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.08);
        color: var(--muted);
        font-size: 14px;
        font-weight: 900;
        cursor: pointer;
      }
      .toggle-btn.active.yes {
        background: rgba(74, 222, 128, 0.14);
        border-color: rgba(74, 222, 128, 0.42);
        color: var(--green);
      }
      .toggle-btn.active.no {
        background: rgba(248, 113, 113, 0.14);
        border-color: rgba(248, 113, 113, 0.42);
        color: var(--red);
      }
      .btn,
      .soft,
      .danger {
        padding: 12px 14px;
        border-radius: 12px;
        font-weight: 900;
      }
      .btn {
        background: linear-gradient(135deg, #8f1018, #ff4d4d);
        color: #fff;
      }
      .btn.cta {
        box-shadow: 0 10px 24px rgba(255, 77, 77, 0.22);
        transform: translateY(-1px);
      }
      .soft {
        background: var(--panel2);
        color: var(--text);
        border: 1px solid var(--line);
      }
      .soft.outline-red {
        background: transparent;
        border-color: rgba(255, 91, 91, 0.34);
        color: #ff9d9d;
      }
      .danger {
        background: #2a1015;
        color: #ffc2c2;
        border: 1px solid #5a202b;
      }
      .checkGroup {
        padding: 12px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }
      .checkGroup h4 {
        font-size: 12px;
        color: var(--gold);
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
      .check {
        display: flex;
        gap: 10px;
        padding: 10px;
        border-radius: 12px;
      }
      .check.on {
        background: rgba(74, 222, 128, 0.08);
        border: 1px solid rgba(74, 222, 128, 0.18);
      }
      .dot {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        border: 2px solid var(--line);
        display: grid;
        place-items: center;
        flex: 0 0 auto;
        font-size: 11px;
        font-weight: 900;
        color: #06120a;
      }
      .check.on .dot {
        background: var(--green);
        border-color: var(--green);
      }
      .check b {
        font-size: 13px;
        display: block;
      }
      .check span {
        font-size: 11px;
        color: var(--muted);
        display: block;
        margin-top: 2px;
        line-height: 1.35;
      }
      .barRow {
        display: grid;
        gap: 6px;
      }
      .barHead {
        display: flex;
        justify-content: space-between;
        gap: 10px;
      }
      .barHead span:first-child {
        font-size: 13px;
      }
      .barHead span:last-child {
        font-size: 12px;
        color: var(--muted);
      }
      .barWrap {
        height: 10px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.06);
        overflow: hidden;
      }
      .bar {
        height: 100%;
        border-radius: 999px;
        background: linear-gradient(90deg, #d7ab52, #f2d48f);
      }
      .bar.green {
        background: linear-gradient(90deg, #34d399, #86efac);
      }
      .bar.red {
        background: linear-gradient(90deg, #fb7185, #fca5a5);
      }
      .bar.blue {
        background: linear-gradient(90deg, #60a5fa, #93c5fd);
      }
      .bar.amber {
        background: linear-gradient(90deg, #f59e0b, #fcd34d);
      }
      .game {
        padding: 14px;
        border-radius: 16px;
        background: var(--panel2);
        border: 1px solid var(--line);
      }
      .gameTop {
        display: grid;
        grid-template-columns: auto 1fr auto;
        gap: 12px;
        align-items: center;
      }
      .res {
        min-width: 76px;
        height: 48px;
        padding: 0 10px;
        border-radius: 14px;
        display: grid;
        place-items: center;
        font-size: 11px;
        font-weight: 900;
        text-align: center;
      }
      .res.win {
        background: rgba(74, 222, 128, 0.1);
        border: 1px solid rgba(74, 222, 128, 0.3);
        color: var(--green);
      }
      .res.loss {
        background: rgba(248, 113, 113, 0.1);
        border: 1px solid rgba(248, 113, 113, 0.3);
        color: var(--red);
      }
      .game h4 {
        font-size: 16px;
      }
      .game small {
        display: block;
        font-size: 12px;
        color: var(--muted);
        margin-top: 2px;
      }
      .score {
        font-size: 15px;
        font-weight: 900;
        color: var(--gold);
        text-align: right;
      }
      .score span {
        display: block;
        font-size: 11px;
        color: var(--muted);
      }
      .metaGrid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
        margin-top: 10px;
      }
      .meta {
        padding: 10px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }
      .guide {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .guide .card {
        padding: 14px;
      }
      .guide h4 {
        font-size: 13px;
        color: #ff6b6b;
        margin-bottom: 6px;
        font-variant-caps: all-small-caps;
        letter-spacing: 0.08em;
      }
      .match {
        padding: 12px;
        border-radius: 14px;
        background: var(--panel2);
        border: 1px solid var(--line);
        display: flex;
        justify-content: space-between;
        gap: 10px;
        align-items: center;
      }
      .match strong {
        font-size: 13px;
      }
      .match span {
        display: block;
        font-size: 11px;
        color: var(--muted);
        margin-top: 3px;
      }
      .resource {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        padding: 14px;
        border-radius: 16px;
        background: var(--panel2);
        border: 1px solid var(--line);
      }
      .sheet-toolbar {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
        margin-bottom: 14px;
      }
      .hidden-file {
        display: none;
      }
      .sheet-pills {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 14px;
      }
      .sheet-pill {
        padding: 8px 12px;
        border-radius: 999px;
        background: var(--panel2);
        border: 1px solid var(--line);
        color: var(--muted);
        cursor: pointer;
        font-size: 12px;
        font-weight: 800;
      }
      .sheet-pill.active {
        background: rgba(255, 91, 91, 0.1);
        border-color: rgba(255, 91, 91, 0.32);
        color: #ff8a8a;
      }
      .matchup-filters {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
        margin-bottom: 12px;
      }
      .matchup-filters .select-pill,
      .matchup-filters input {
        min-width: 160px;
      }
      .table-wrap {
        overflow: auto;
        border-radius: 16px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.02);
      }
      .champions-shell {
        display: grid;
        gap: 14px;
        padding-bottom: 104px;
      }
      .champion-search-card {
        background:
          radial-gradient(
            circle at top right,
            rgba(255, 91, 91, 0.12),
            transparent 28%
          ),
          linear-gradient(180deg, var(--panel), #10131d);
      }
      .champion-search-bar {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: end;
      }
      .champion-search-field {
        flex: 1 1 280px;
        min-width: 220px;
      }
      .champion-search-field input {
        width: 100%;
      }
      .champion-search-hint {
        margin-top: 10px;
        font-size: 12px;
        color: var(--muted);
        line-height: 1.6;
      }
      .champion-state {
        padding: 18px;
        border-radius: 18px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.015));
        border: 1px solid rgba(255, 255, 255, 0.06);
      }
      .champion-state.error {
        border-color: rgba(255, 91, 91, 0.28);
        background: rgba(255, 91, 91, 0.08);
      }
      .champion-state strong {
        display: block;
        font-size: 14px;
        margin-bottom: 6px;
      }
      .champion-state span {
        display: block;
        font-size: 12px;
        color: var(--muted);
        line-height: 1.6;
      }
      .champion-overview {
        position: relative;
        overflow: hidden;
        min-height: 240px;
        display: grid;
        align-items: end;
      }
      .champion-overview::before {
        content: '';
        position: absolute;
        inset: 0;
        background:
          linear-gradient(180deg, rgba(6, 8, 12, 0.12), rgba(6, 8, 12, 0.92)),
          var(--champion-splash, linear-gradient(135deg, #121214, #151a22));
        background-size: cover;
        background-position: center center;
        opacity: 0.95;
      }
      .champion-overview-inner {
        position: relative;
        z-index: 1;
        display: grid;
        grid-template-columns: 124px minmax(0, 1fr);
        gap: 18px;
        align-items: end;
      }
      .champion-portrait {
        width: 124px;
        height: 124px;
        border-radius: 24px;
        object-fit: cover;
        border: 1px solid rgba(255, 255, 255, 0.14);
        box-shadow: 0 16px 36px rgba(0, 0, 0, 0.32);
        background: rgba(255, 255, 255, 0.04);
      }
      .champion-overview-copy h3 {
        font-size: 32px;
        line-height: 1.02;
        margin-bottom: 0;
      }
      .champion-spell-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 14px;
      }
      .champion-spell-card {
        position: relative;
        background: linear-gradient(180deg, #12151d, #0f1218);
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 18px;
        padding: 16px;
      }
      .champion-spell-card.key-spell {
        border-color: rgba(255, 91, 91, 0.72);
        box-shadow: 0 0 0 1px rgba(255, 91, 91, 0.18), 0 14px 32px rgba(255, 91, 91, 0.12);
      }
      .champion-spell-badge {
        position: absolute;
        top: 12px;
        right: 12px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 5px 9px;
        border-radius: 999px;
        background: linear-gradient(135deg, #ff5454, #ff8a4c);
        color: #fff;
        font-size: 10px;
        font-weight: 900;
        letter-spacing: 0.08em;
        box-shadow: 0 8px 20px rgba(255, 91, 91, 0.22);
      }
      .champion-spell-head {
        display: flex;
        gap: 12px;
        align-items: center;
        margin-bottom: 12px;
      }
      .champion-spell-icon {
        width: 58px;
        height: 58px;
        border-radius: 16px;
        object-fit: cover;
        border: 1px solid rgba(255, 255, 255, 0.12);
        flex-shrink: 0;
      }
      .champion-spell-slot {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 28px;
        height: 28px;
        border-radius: 999px;
        background: rgba(255, 91, 91, 0.14);
        color: #ff8f8f;
        font-size: 12px;
        font-weight: 900;
        margin-bottom: 6px;
      }
      .champion-spell-head h4 {
        font-size: 16px;
        margin-bottom: 4px;
      }
      .champion-spell-stats {
        display: grid;
        gap: 8px;
        margin-top: 14px;
      }
      .champion-spell-stat {
        padding: 10px 12px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

        padding: 3px 8px;
        border-radius: 999px;
        white-space: nowrap;
        flex-shrink: 0;
      }
      .guide-notes {
        font-size: 11px;
        color: var(--muted);
        line-height: 1.45;
        margin-top: 5px;
      }
      .guide-url-preview {
        border-radius: 12px;
        overflow: hidden;
        display: none;
        margin-top: 8px;
        max-width: 320px;
      }
      .guide-url-preview.show {
        display: block;
      }
      .guide-url-preview img {
        width: 100%;
        display: block;
      }
      @media (max-width: 640px) {
        .guide-grid {
          grid-template-columns: 1fr;
        }
      }
      /* STAT COLOR CELLS */
      .stat-cells {
        display: grid;
        grid-template-columns: repeat(6, minmax(0, 1fr));
        gap: 6px;
        margin-top: 10px;
      }
      .stat-cell {
        padding: 8px 4px;
        border-radius: 10px;
        text-align: center;
        border: 1px solid rgba(255, 255, 255, 0.06);
        background: rgba(255, 255, 255, 0.03);
      }
      .sc-label {
        display: block;
        font-size: 9px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: rgba(255, 255, 255, 0.4);
        margin-bottom: 4px;
      }
      .sc-val {
        display: block;
        font-size: 17px;
        font-weight: 900;
        line-height: 1;
      }
      .sc-good {
        background: rgba(74, 222, 128, 0.13);
        border-color: rgba(74, 222, 128, 0.28);
      }
      .sc-good .sc-val {
        color: #57f287;
      }
      .sc-mid {
        background: rgba(255, 138, 76, 0.11);
        border-color: rgba(255, 138, 76, 0.24);
      }
      .sc-mid .sc-val {
        color: #ff8a4c;
      }
      .sc-bad {
        background: rgba(248, 113, 113, 0.12);
        border-color: rgba(248, 113, 113, 0.26);
      }
      .sc-bad .sc-val {
        color: #ff5b5b;
      }
      /* STREAK BANNER */
      .streak-banner {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 16px;
        border-radius: 16px;
        margin-top: 14px;
        font-weight: 900;
        font-size: 14px;
        animation: fadeSlide 0.3s ease;
      }
      .streak-banner.win-streak {
        background: rgba(74, 222, 128, 0.1);
        border: 1px solid rgba(74, 222, 128, 0.3);
        color: var(--green);
      }
      .streak-banner.loss-streak {
        background: rgba(255, 91, 91, 0.12);
        border: 1px solid rgba(255, 91, 91, 0.3);
        color: var(--red);
      }
      .streak-icon {
        font-size: 24px;
        flex-shrink: 0;
        line-height: 1;
      }
      /* SESSION ROW */
      .session-row {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        margin-top: 14px;
      }
      .session-empty {
        margin-top: 14px;
        padding: 18px 20px;
        border-radius: 18px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.015));
        border: 1px solid rgba(255, 255, 255, 0.06);
        color: #c7c7cf;
        font-size: 13px;
        font-weight: 700;
        text-align: center;
      }
      .goal-shell {
        display: grid;
        gap: 16px;
      }
      .goal-top {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: 16px;
      }
      .goal-rank {
        display: grid;
        gap: 8px;
        justify-items: center;
        text-align: center;
      }
      .goal-rank.goal-current {
        justify-items: start;
        text-align: left;
      }
      .goal-rank.goal-target {
        justify-items: end;
        text-align: right;
      }
      .goal-rank img {
        width: 68px;
        height: 68px;
        object-fit: contain;
        filter: drop-shadow(0 6px 18px rgba(255, 77, 77, 0.18));
      }
      .goal-rank-label {
        font-size: 10px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--muted);
        font-weight: 900;
      }
      .goal-rank-name {
        font-size: 18px;
        font-weight: 900;
        color: var(--text);
      }
      .goal-center {
        min-width: 160px;
        text-align: center;
      }
      .goal-percent {
        font-size: 34px;
        font-weight: 900;
        color: #fff6f6;
        line-height: 1;
      }
      .goal-percent-copy {
        margin-top: 6px;
        font-size: 11px;
        color: #ffb4b4;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-weight: 900;
      }
      .goal-progress {
        height: 14px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        overflow: hidden;
      }
      .goal-progress-fill {
        height: 100%;
        border-radius: 999px;
        background: linear-gradient(90deg, #ff5454, #ff8a4c);
      }
      .goal-bottom {
        display: grid;
        gap: 8px;
        text-align: center;
      }
      .goal-tiers {
        font-size: 13px;
        color: #d7d7df;
        font-weight: 800;
      }
      .goal-estimate {
        font-size: 12px;
        color: var(--muted);
      }
      .stats-empty-note {
        margin-top: 14px;
        text-align: center;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.52);
      }
      /* LP CHART */
      .lp-chart-wrap {
        padding: 4px 0 0;
        position: relative;
      }
      /* TREND PILLS */
      .trend-pill {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 3px 9px;
        border-radius: 999px;
        font-size: 10px;
        font-weight: 800;
        vertical-align: middle;
        margin-left: 6px;
      }
      .trend-up {
        background: rgba(74, 222, 128, 0.12);
        color: var(--green);
      }
      .trend-down {
        background: rgba(255, 91, 91, 0.12);
        color: var(--red);
      }
      .trend-eq {
        background: rgba(255, 255, 255, 0.06);
        color: var(--muted);
      }
      /* ROLE WR BARS */
      .role-wr-grid {
        display: grid;
        gap: 8px;
        margin-top: 10px;
      }
      .role-wr-row {
        display: grid;
        grid-template-columns: 72px 1fr 54px;
        gap: 8px;
        align-items: center;
      }
      .role-wr-label {
        font-size: 11px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      .role-wr-val {
        font-size: 11px;
        color: var(--muted);
        text-align: right;
      }
      /* FADE ANIMATION */
      @keyframes fadeSlide {
        from { opacity: 0; transform: translateY(-6px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @media (max-width: 900px) {
        .g4,
        .g3,
        .g2,
        .guide,
        .hero-grid {
          grid-template-columns: 1fr;
        }
        .hero-mark {

        .s2,
        .s3,

        .metaGrid,
        .toggles {
          grid-template-columns: 1fr;
        }
        .session-row {
          grid-template-columns: repeat(3, 1fr);
        }
      }
      @media (max-width: 640px) {

        }
        .navIn::-webkit-scrollbar {

        }
        .nav button {

        }
      }

      }

      function load() {
        try {
          const raw = localStorage.getItem(KEY)
          if (raw) data = { ...data, ...JSON.parse(raw) }
          if (!Array.isArray(data.profile.pool))
            data.profile.pool = String(data.profile.pool || '')
              .split(',')
              .map((v) => v.trim())
              .filter(Boolean)
          if (!data.profile.server) data.profile.server = 'LAN'
          if (!data.profile.goal) data.profile.goal = 'MASTER'
          if (!Array.isArray(data.accounts)) data.accounts = []
          data.accounts = data.accounts.map((account) => ({
            ...account,
            goal: account.goal || data.profile.goal || 'MASTER',
          }))
          if (!Array.isArray(data.guides)) data.guides = []
          data.matchupSheets = dedupeMatchupSheetsByName(
            Array.isArray(data.matchupSheets) ? data.matchupSheets : []
          )
          const existingIds = new Set(data.guides.map((g) => g.id))
          const missing = PREDEFINED_GUIDES.filter((g) => !existingIds.has(g.id))
          if (missing.length) data.guides = [...data.guides, ...missing.map((g) => ({ ...g }))]
        } catch {}
      }
      function save() {
        localStorage.setItem(KEY, JSON.stringify(data))
      }
      const $ = (id) => document.getElementById(id)
      let toastTimer = null
      function toast(t, variant = '', duration = 1800) {
        $('toast').textContent = t
        $('toast').className = `toast${variant ? ` ${variant}` : ''}`
        $('toast').classList.add('show')
        clearTimeout(toastTimer)
        toastTimer = setTimeout(() => {
          $('toast').classList.remove('show')
          $('toast').className = 'toast'
        }, duration)
      }
      function pct(a, b) {
        return b ? Math.round((a / b) * 100) : 0
      }
      function avg(arr) {
        return arr.length ? arr.reduce((a, b) => a + b, 0) / arr.length : 0
      }
      function fmtDur(sec) {
        const m = Math.floor(sec / 60) || 0
        const s = sec % 60 || 0
        return `${m}m ${String(s).padStart(2, '0')}s`
      }
      function parseDurationInput(value) {
        const match = String(value || '').trim().match(/^(\d{1,3}):([0-5]\d)$/)
        if (!match) return null
        return Number(match[1]) * 60 + Number(match[2])
      }
      function formatDurationInput(sec) {
        const total = Math.max(0, Number(sec) || 0)
        const m = Math.floor(total / 60)
        const s = total % 60
        return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`
      }
      function createOptions(arr, selected = '') {
        return arr
          .map(
            (v) => `<option ${v === selected ? 'selected' : ''}>${v}</option>`
          )
          .join('')
      }
      function escapeHtml(value) {
        return String(value ?? '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;')
      }
      function normalizeChampionQuery(value) {
        return String(value || '')
          .normalize('NFD')
          .replace(/[\u0300-\u036f]/g, '')
          .replace(/[^a-z0-9]/gi, '')
          .toLowerCase()
      }
      function setChampionLookupEntry(key, id) {
        const normalized = normalizeChampionQuery(key)
        if (normalized) championLookup[normalized] = id
      }
      function formatChampionText(value) {
        const withBreaks = String(value || '')
          .replace(/<br\s*\/?>/gi, '\n')
          .replace(/<\/p>/gi, '\n')
          .replace(/<\/li>/gi, '\n')
          .replace(/<li>/gi, '• ')
          .replace(/\{\{\s*([^}]+)\s*\}\}/g, '$1')
        const stripped = withBreaks.replace(/<[^>]+>/g, '')
        return escapeHtml(stripped.trim()).replace(/\n+/g, '<br>')
      }
      function buildChampionDirectory(champs) {
        championLookup = {}
        championDirectory = champs
          .map((champ) => ({
            id: champ.id,
            key: champ.key,
            name: champ.name,
            title: champ.title,
            image: champ.image?.full || `${champ.id}.png`,
          }))
          .sort((a, b) => a.name.localeCompare(b.name, 'es'))
        championDirectoryById = Object.fromEntries(
          championDirectory.map((champ) => [champ.id, champ])
        )
        championDirectory.forEach((champ) => {
          setChampionLookupEntry(champ.id, champ.id)
          setChampionLookupEntry(champ.name, champ.id)
          setChampionLookupEntry(champ.key, champ.id)
        })
      }
      function championCatalogOptionsHtml() {
        return championDirectory
          .map(
            (champ) =>
              `<option value="${escapeHtml(champ.name)}">${escapeHtml(champ.name)} · ${escapeHtml(champ.title)}</option>`
          )
          .join('')
      }
      function getChampionExplorerContent() {
        if (championExplorerState.loading) {
          return `<div class="champion-state"><strong>Cargando campeón...</strong><span>Consultando Data Dragon y preparando habilidades, costos y cooldowns.</span></div>`
        }
        if (championExplorerState.error) {
          return `<div class="champion-state error"><strong>No pude encontrar ese campeón.</strong><span>${escapeHtml(championExplorerState.error)}</span></div>`
        }
        if (!championExplorerState.detail) {
          return `<div class="champion-state"><strong>Explora un campeón</strong><span>Busca por nombre normal o escribe variantes como <b>Miss Fortune</b>, <b>MissFortune</b> o <b>Twisted Fate</b>. SUPRO resolverá automáticamente el nombre correcto para la URL.</span></div>`
        }
        const champion = championExplorerState.detail
        const directoryData = championDirectoryById[champion.id] || {}
        const splash = `url('https://ddragon.leagueoflegends.com/cdn/img/champion/splash/${champion.id}_0.jpg')`
        const portrait = `https://ddragon.leagueoflegends.com/cdn/${DDRAGON_VERSION}/img/champion/${directoryData.image || champion.image?.full || `${champion.id}.png`}`
        const abilityCards = [
          ...((champion.passive?.cooldownBurn &&
          champion.passive.cooldownBurn !== '0' &&
          champion.passive.cooldownBurn !== '0/0/0/0/0')
            ? [{
                slot: 'P',
                name: champion.passive?.name || 'Pasiva',
                icon: `https://ddragon.leagueoflegends.com/cdn/${DDRAGON_VERSION}/img/passive/${champion.passive?.image?.full || ''}`,
                cooldown: champion.passive.cooldownBurn,
                isKey:
                  (parseCooldownLevelOne(champion.passive.cooldownBurn) || 0) >
                  60,
              }]
            : []),
          ...(champion.spells || []).map((spell, index) => ({
            slot: ['Q', 'W', 'E', 'R'][index] || `S${index + 1}`,
            name: spell.name,
            icon: `https://ddragon.leagueoflegends.com/cdn/${DDRAGON_VERSION}/img/spell/${spell.image?.full || ''}`,
            cooldown:
              spell.cooldownBurn && spell.cooldownBurn !== '0'
                ? spell.cooldownBurn
                : 'Sin enfriamiento',
            isKey: (parseCooldownLevelOne(spell.cooldownBurn) || 0) > 60,
          })),
        ]
          .map((ability) => {
            const statBlocks = []
            if (ability.cooldown) {
              statBlocks.push(
                `<div class="champion-spell-stat cooldown-stat"><label>Cooldown por nivel</label><div>${escapeHtml(ability.cooldown)}</div></div>`
              )
            }
            return `<div class="champion-spell-card${ability.isKey ? ' key-spell' : ''}">
              ${ability.isKey ? `<span class="champion-spell-badge">CLAVE</span>` : ''}
              <div class="champion-spell-head">
                <img class="champion-spell-icon" src="${ability.icon}" alt="${escapeHtml(ability.name)}" onerror="this.src='${champImg(champion.name)}'">
                <div>
                  <span class="champion-spell-slot">${escapeHtml(ability.slot)}</span>
                  <h4>${escapeHtml(ability.name)}</h4>
                </div>
              </div>
              ${statBlocks.length ? `<div class="champion-spell-stats">${statBlocks.join('')}</div>` : ''}
            </div>`
          })
          .join('')
        return `<div class="champions-shell">
          <div class="card champion-overview" style="--champion-splash:${splash}">
            <div class="champion-overview-inner">
              <img class="champion-portrait" src="${portrait}" alt="${escapeHtml(champion.name)}" onerror="this.src='${champImg(champion.name)}'">
              <div class="champion-overview-copy">
                <h3>${escapeHtml(champion.name)}</h3>
              </div>
            </div>
          </div>
          <div class="champion-spell-grid">${abilityCards}</div>
        </div>`
      }

                <input id="championSearchInput" list="championCatalogList" placeholder="Ej: Miss Fortune, Twisted Fate, Lee Sin" value="${escapeHtml(championExplorerState.query)}" oninput="championExplorerState.query=this.value" onkeydown="handleChampionSearchKeydown(event)">

      function absLp(g) {
        const tIdx = RANKS.indexOf(g.tier)
        if (tIdx < 0) return 0
        const divMap = { IV: 0, III: 1, II: 2, I: 3, '--': 0 }
        const dIdx = divMap[g.division] ?? 0
        if (tIdx >= 7) return tIdx * 400 + Math.max(0, Number(g.lp) || 0)
        return tIdx * 400 + dIdx * 100 + Math.min(99, Math.max(0, Number(g.lp) || 0))
      }
      function rankFromAbsLp(lp) {
        const tIdx = Math.min(Math.floor(lp / 400), RANKS.length - 1)
        const tier = RANKS[Math.max(0, tIdx)]
        if (tIdx >= 7) return RANK_LABEL[tier]
        const divNames = ['IV', 'III', 'II', 'I']
        const dIdx = Math.min(3, Math.floor((lp % 400) / 100))
        return `${RANK_LABEL[tier]} ${divNames[dIdx]}`
      }
      function getStreak(games) {
        if (!games.length) return null
        const sorted = [...games].sort((a, b) =>
          b.date !== a.date ? b.date.localeCompare(a.date) : (b.id || 0) - (a.id || 0)
        )
        const type = sorted[0].result
        let count = 0
        for (const g of sorted) {
          if (g.result === type) count++
          else break
        }
        return { type, count }
      }
      function todaySession(games) {

        const tg = games.filter((g) => g.date === today)
        const wins = tg.filter((g) => g.result === 'win').length
        const lpNet = tg.reduce(
          (s, g) => s + (g.result === 'win' ? 1 : -1) * (Number(g.lp) || 0),
          0
        )
        return { total: tg.length, wins, losses: tg.length - wins, lpNet }
      }
      function renderLpChart() {
        const games = myGames()
          .slice()
          .sort((a, b) =>
            a.date !== b.date ? a.date.localeCompare(b.date) : (a.id || 0) - (b.id || 0)
          )
        if (games.length < 2)
          return '<div class="small" style="text-align:center;padding:24px 0;color:var(--muted)">Juega al menos 2 partidas para ver el gráfico de LP.</div>'
        const pts = games.map((g) => absLp(g))
        const minY = Math.min(...pts),
          maxY = Math.max(...pts)
        const range = maxY - minY || 100
        const W = 600,
          H = 150,
          px = 52,
          py = 14
        const cw = W - px - 12,
          ch = H - py * 2
        const xs = pts.map((_, i) =>
          px + (pts.length === 1 ? cw / 2 : (i / (pts.length - 1)) * cw)
        )
        const ys = pts.map((p) => py + (1 - (p - minY) / range) * ch)
        const linePath = xs
          .map((x, i) => `${i === 0 ? 'M' : 'L'}${x.toFixed(1)},${ys[i].toFixed(1)}`)
          .join(' ')
        const areaPath = `${linePath} L${xs[xs.length - 1].toFixed(1)},${H - py} L${px},${H - py} Z`
        const dots = games
          .map(
            (g, i) =>
              `<circle cx="${xs[i].toFixed(1)}" cy="${ys[i].toFixed(1)}" r="${games.length > 40 ? 2 : 3.5}" fill="${g.result === 'win' ? '#57f287' : '#ff5b5b'}" stroke="rgba(0,0,0,.35)" stroke-width="1"/>`
          )
          .join('')
        const gridLines = [0, 0.25, 0.5, 0.75, 1]
          .map((t) => {
            const lpVal = Math.round(minY + t * range)
            const y = (py + (1 - t) * ch).toFixed(1)
            const label = rankFromAbsLp(lpVal)
            return `<line x1="${px}" y1="${y}" x2="${W - 12}" y2="${y}" stroke="rgba(255,255,255,.05)" stroke-width="1"/><text x="${(px - 4).toFixed(0)}" y="${(Number(y) + 3.5).toFixed(1)}" fill="rgba(255,255,255,.22)" font-size="8.5" font-family="sans-serif" text-anchor="end">${label}</text>`
          })
          .join('')
        return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block;overflow:visible"><defs><linearGradient id="lpGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="rgba(255,91,91,.3)"/><stop offset="100%" stop-color="rgba(255,91,91,0)"/></linearGradient></defs>${gridLines}<path d="${areaPath}" fill="url(#lpGrad)"/><path d="${linePath}" fill="none" stroke="rgba(255,91,91,.85)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>${dots}</svg>`
      }

        // Streak KPI

      async function searchChampionExplorer(forceValue) {
        const query = String(forceValue ?? $('championSearchInput')?.value ?? championExplorerState.query).trim()
        championExplorerState.query = query
        championExplorerState.error = ''
        championExplorerState.loading = true
        renderChampionExplorer()
        if (!query) {
          championExplorerState.loading = false
          championExplorerState.detail = null
          championExplorerState.selectedId = ''
          championExplorerState.error = 'Escribe el nombre de un campeón para buscarlo.'
          renderChampionExplorer()
          return
        }
        try {
          await ensureChampionCatalog()
          const championId = championLookup[normalizeChampionQuery(query)]
          if (!championId) {
            championExplorerState.loading = false
            championExplorerState.detail = null
            championExplorerState.selectedId = ''
            championExplorerState.error = `No encontré "${query}" en la lista oficial de Riot.`
            renderChampionExplorer()
            return
          }
          championExplorerState.selectedId = championId
          if (!championDetailCache[championId]) {
            const res = await fetch(
              `https://ddragon.leagueoflegends.com/cdn/${DDRAGON_VERSION}/data/${DDRAGON_LOCALE}/champion/${championId}.json`
            )
            if (!res.ok) {
              throw new Error('Riot no devolvió datos para ese campeón.')
            }
            const json = await res.json()
            championDetailCache[championId] = json.data?.[championId] || null
          }
          championExplorerState.detail = championDetailCache[championId]
          championExplorerState.error = championExplorerState.detail
            ? ''
            : 'La respuesta llegó vacía. Intenta de nuevo en unos segundos.'
        } catch (error) {
          championExplorerState.detail = null
          championExplorerState.selectedId = ''
          championExplorerState.error =
            error?.message ||
            'Hubo un problema al consultar Data Dragon. Revisa tu conexión e intenta otra vez.'
        } finally {
          championExplorerState.loading = false
          renderChampionExplorer()
        }
      }

            const title = await fetchYtTitle(url)

              titleInput.placeholder = 'Nombre de la guía o video'

      function saveGuide() {
        const url = $('guideUrl')?.value.trim()
        const title = $('guideTitle')?.value.trim()
        const category = $('guideCat')?.value || 'general'
        const notes = $('guideNotes')?.value.trim()
        if (!url) return toast('Pega una URL primero')
        if (!title) return toast('Ponle un título')
        if (!Array.isArray(data.guides)) data.guides = []
        data.guides.push({ id: Date.now(), url, title, category, notes: notes || '' })
        save()
        $('guideUrl').value = ''
        $('guideTitle').value = ''
        $('guideNotes').value = ''
        const preview = $('guideUrlPreview')
        if (preview) { preview.className = 'guide-url-preview'; preview.innerHTML = '' }
        renderGuides()
        toast('Guía guardada')
      }
      function deleteGuide(id) {
        data.guides = (data.guides || []).filter((g) => g.id !== id)
        save()
        renderGuides()
      }
      function setGuideFilter(cat) {
        guideFilter = cat

        const totalPages = Math.max(1, Math.ceil(filtered.length / perPage))

      function renderMatchups() {
        const box = $('matchupContent')
        if (!box) return
        if (!data.matchupSheets.length) {
          box.innerHTML = '<div class="small" style="padding:24px 0;text-align:center;color:var(--muted)">Aún no has subido ningún Excel. Usa el botón de arriba para importar tu base de matchups.</div>'
          return
        }
        const current = data.matchupSheets.find((s) => s.id === data.activeMatchupId) || data.matchupSheets[0]
        if (current && data.activeMatchupId !== current.id) { data.activeMatchupId = current.id; save() }
        const rawHeaders = current.rows?.[0] || []
        const bodyRows = current.rows?.slice(1) || []
        const normalize = (s) => String(s ?? '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').trim()
        const visibleIndices = rawHeaders.map((_, index) => index).filter((index) => {
          const headerText = String(rawHeaders[index] ?? '').trim()
          const hasMeaningfulValue = bodyRows.some((row) => {
            const text = String(row?.[index] ?? '').trim()
            return text && text !== '—' && text !== '-'
          })
          return headerText || hasMeaningfulValue
        })
        const headers = visibleIndices.map((index) => rawHeaders[index])
        const rows = bodyRows.map((row) => visibleIndices.map((index) => row?.[index] ?? ''))
        const headerKeys = headers.map(normalize)
        const laneIndex = headerKeys.findIndex((k) => k.includes('linea') || k.includes('lane') || k.includes('rol'))
        const diffIndex = headerKeys.findIndex((k) => k.includes('dific') || k.includes('difficulty') || k.includes('nivel'))
        const query = data.matchupFilters?.query || ''
        const laneFilter = data.matchupFilters?.lane || 'all'
        const diffFilter = data.matchupFilters?.diff || 'all'
        const filteredRows = rows.filter((row) => {
          const allText = row.map((c) => normalize(c)).join(' ')
          const laneText = laneIndex >= 0 ? normalize(row?.[laneIndex]) : ''
          const diffText = diffIndex >= 0 ? String(row?.[diffIndex] ?? '').trim() : ''
          return (!query || allText.includes(query.toLowerCase())) &&
            (laneFilter === 'all' || laneText === laneFilter) &&
            (diffFilter === 'all' || diffText === diffFilter)
        })
        const laneOptions = [...new Set(rows.map((r) => String(laneIndex >= 0 ? (r?.[laneIndex] ?? '') : '').trim()).filter(Boolean))]
        const diffOptions = [...new Set(rows.map((r) => String(diffIndex >= 0 ? (r?.[diffIndex] ?? '') : '').trim()).filter(Boolean))].sort()
        const renderCell = (key, value) => {
          const text = String(value ?? '').trim()
          if (!text) return '<span style="color:rgba(255,255,255,.2)">—</span>'
          if (key.includes('champ') || key.includes('campeon') || key.includes('nombre')) {
            return `<div class="matchup-champ" title="${text}"><img src="${champImg(text)}" alt="${text}" onerror="this.src='https://res.cloudinary.com/dfr9zlu8d/image/upload/v1777329733/supro-logo_rvavuy.jpg'"><div style="font-size:11px;color:var(--muted);margin-top:4px;text-align:center;max-width:72px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${text}</div></div>`
          }
          if (key.includes('dific') || key.includes('difficulty') || key.includes('nivel')) {
            const n = Number.parseFloat(text) || 1
            const lvl = Math.max(1, Math.min(10, Math.ceil(n)))
            return `<span class="matchup-pill diff-${lvl}">${text}</span>`
          }
          if (key.includes('linea') || key.includes('lane') || key.includes('rol')) {
            return `<span class="matchup-pill lane-${text.toLowerCase()}">${text}</span>`
          }
          return `<div style="max-width:340px;line-height:1.7;white-space:pre-wrap;font-size:13px">${text}</div>`
        }
        const sheetTabs = data.matchupSheets.length > 1
          ? `<div class="sheet-pills">${data.matchupSheets.map((s) => `<button class="sheet-pill ${s.id === current.id ? 'active' : ''}" onclick="setActiveMatchup('${s.id}')">${s.sheetName}</button>`).join('')}</div>`
          : ''
        const laneSelect = laneOptions.length
          ? `<select class="select-pill" id="matchupLaneFilter" onchange="setMatchupLaneFilter(this.value)">
              <option value="all">Todas las líneas</option>
              ${laneOptions.map((l) => `<option value="${l.toLowerCase()}" ${laneFilter === l.toLowerCase() ? 'selected' : ''}>${l}</option>`).join('')}
            </select>`
          : ''
        const diffSelect = diffOptions.length
          ? `<select class="select-pill" id="matchupDiffFilter" onchange="setMatchupDiffFilter(this.value)">
              <option value="all">Todas las dificultades</option>
              ${diffOptions.map((d) => `<option value="${d}" ${diffFilter === d ? 'selected' : ''}>${d}</option>`).join('')}
            </select>`
          : ''
        const tableHtml = filteredRows.length === 0
          ? '<div class="small" style="padding:24px;text-align:center;color:var(--muted)">No hay resultados para esa búsqueda.</div>'
          : `<div class="table-wrap"><table class="sheet-table">
              <thead><tr>${headers.map((h) => `<th>${h ?? '—'}</th>`).join('')}</tr></thead>
              <tbody>${filteredRows.map((row) => `<tr>${headers.map((_, i) => `<td>${renderCell(headerKeys[i], row?.[i])}</td>`).join('')}</tr>`).join('')}</tbody>
            </table></div>`
        box.innerHTML = sheetTabs + `<div class="matchup-filters">
          <input class="select-pill" id="matchupSearch" placeholder="🔍 Buscar en la tabla..." value="${query.replace(/"/g, '&quot;')}" oninput="setMatchupSearch(this.value)" style="flex:1;min-width:160px">
          ${laneSelect}${diffSelect}
          <div style="margin-left:auto;display:flex;gap:8px;align-items:center;flex-shrink:0">
            <span style="font-size:12px;color:var(--muted)">${filteredRows.length} / ${rows.length} filas</span>
            <button class="danger" onclick="deleteMatchupSheet('${current.id}')">Eliminar hoja</button>
          </div>
        </div>` + tableHtml
      }
      function setMatchupSearch(value) {
        data.matchupFilters.query = String(value || '').toLowerCase()
        save()
        renderMatchups()
        const input = $('matchupSearch')
        if (input) {
          input.focus()
          const len = input.value.length
          input.setSelectionRange?.(len, len)
        }
      }
      function setMatchupLaneFilter(value) {
        data.matchupFilters.lane = value
        save()
        renderMatchups()
      }
      function setMatchupDiffFilter(value) {
        data.matchupFilters.diff = value
        save()
        renderMatchups()
      }
      function setActiveMatchup(id) {
        data.activeMatchupId = id
        save()
        renderMatchups()
      }
      function deleteMatchupSheet(id) {
        data.matchupSheets = data.matchupSheets.filter(
          (sheet) => sheet.id !== id
        )
        if (data.activeMatchupId === id)
          data.activeMatchupId = data.matchupSheets[0]?.id || ''
        save()
        renderMatchups()
        toast('Hoja eliminada')
      }
      function clearMatchups() {
        if (!data.matchupSheets.length) return toast('No hay matchups cargados')
        if (!confirm('¿Borrar todas las hojas de matchups importadas?')) return
        data.matchupSheets = []
        data.activeMatchupId = ''
        save()
        renderMatchups()
        toast('Matchups borrados')
      }
      async function importMatchupWorkbook(event) {
        const file = event?.target?.files?.[0]
        if (!file) return
        if (typeof XLSX === 'undefined')
          return toast('No pude cargar el lector de Excel')
        try {
          const buffer = await file.arrayBuffer()
          const workbook = XLSX.read(buffer, { type: 'array' })
          const importedSheets = workbook.SheetNames.map((sheetName, index) => {
            const worksheet = workbook.Sheets[sheetName]
            const rows = XLSX.utils
              .sheet_to_json(worksheet, {
                header: 1,
                blankrows: false,
                defval: '',
              })
              .filter((row) =>
                row.some((cell) => String(cell ?? '').trim() !== '')
              )
            return {
              id: `${Date.now()}-${index}-${sheetName}`,
              workbookName: file.name,
              sheetName,
              rows,
            }
          }).filter((sheet) => sheet.rows.length)
          const beforeCount = data.matchupSheets.length
          data.matchupSheets = dedupeMatchupSheetsByName([
            ...data.matchupSheets,
            ...importedSheets,
          ])
          if (!data.activeMatchupId && importedSheets[0])
            data.activeMatchupId = importedSheets[0].id
          save()
          renderMatchups()
          event.target.value = ''
          toast(`${data.matchupSheets.length - beforeCount} hojas importadas`)
        } catch {
          toast('No pude leer ese Excel')
        }
      }
      function applyImported(i) {
        const m = data.importedMatches[i]
        if (!m) return
        switchTab('partida')
        setResult(m.result || (m.info?.win ? 'win' : 'loss'))
        $('gDate').value = (
          m.date || new Date().toISOString().slice(0, 10)
        ).slice(0, 10)
        $('gChamp').value =
          m.champion || m.info?.championName || $('gChamp').value
        $('gEnemy').value =
          m.enemy || m.info?.enemyChampion || $('gEnemy').value
        $('gRole').value = m.role || m.info?.teamPosition || $('gRole').value
        $('gKills').value = m.kills ?? m.info?.kills ?? 0
        $('gDeaths').value = m.deaths ?? m.info?.deaths ?? 0
        $('gAssists').value = m.assists ?? m.info?.assists ?? 0
        $('gCs').value = m.csMin ?? m.info?.csMin ?? 0
        $('gWards').value = m.wards ?? m.info?.wardsPlaced ?? 0
        $('gPinks').value = m.pinks ?? m.info?.detectorWardsPlaced ?? 0
        const d = m.durationSec ?? m.info?.gameDuration ?? 0
        $('gDuration').value = formatDurationInput(d)
        toast('Campos autollenados')
      }
      function switchTab(tab) {
        if ((tab === 'partida' || tab === 'historial') && !hasActiveProfile())
          tab = 'importar'
        ;[
          'inicio',
          'partida',
          'importar',
          'historial',
          'stats',
          'matchups',
          'campeones',
          'tips',
          'recursos',
          'guias',
        ].forEach((t) => {
          $(`tab-${t}`).classList.toggle('hidden', t !== tab)
        })
        document
          .querySelectorAll('.nav button')
          .forEach((b) => b.classList.toggle('active', b.dataset.tab === tab))
        document
          .querySelectorAll('.mobile-nav-btn')
          .forEach((b) =>
            b.classList.toggle('active', b.dataset.mobileTab === tab)
          )
        toggleMobileMenu(false)
        if (tab === 'historial') renderHistory()
        if (tab === 'importar') renderImported()
        if (tab === 'stats') renderStats()
        if (tab === 'matchups') renderMatchups()
        if (tab === 'campeones') renderChampionExplorer()
        if (tab === 'guias') renderGuides()
      }
      function toggleMobileMenu(force) {
        const drawer = $('mobileDrawer')
        const trigger = document.querySelector('.menu-btn')
        if (!drawer) return
        const next =
          typeof force === 'boolean'
            ? force
            : !drawer.classList.contains('open')
        drawer.classList.toggle('open', next)
        if (trigger)
          trigger.setAttribute('aria-expanded', next ? 'true' : 'false')
      }
      function closeMobileMenu(event) {
        if (event?.target?.id === 'mobileDrawer') toggleMobileMenu(false)
      }
      function syncMobileMenu() {
        const profileBox = $('mobileProfile')
        const logoutBtn = $('mobileLogoutBtn')
        if (profileBox) {
          if (hasActiveProfile()) {
            profileBox.classList.add('show')
            profileBox.innerHTML = `<img src="${rankImg(data.profile.rank)}" alt=""><div><strong>${data.profile.gameName}#${data.profile.tagLine}</strong><span>${RANK_LABEL[data.profile.rank]}</span></div>`
          } else {
            profileBox.classList.remove('show')
            profileBox.innerHTML = ''
          }
        }
        if (logoutBtn) logoutBtn.classList.toggle('show', hasActiveProfile())
        document.querySelectorAll('.mobile-nav-btn').forEach((btn) => {
          const blocked =
            !hasActiveProfile() &&
            (btn.dataset.mobileTab === 'partida' ||
              btn.dataset.mobileTab === 'historial')
          btn.style.display = blocked ? 'none' : 'flex'
        })
      }
      function init() {
        load()
        renderBase()
        syncProfileInputs()
        seedInputs()
        renderQuick()
        renderDashboard()
        renderHistory()
        renderProgress()
        renderStats()
        renderMatchups()
        renderAccounts()
        updateNavVisibility()
        fetchChampionList()
        document
          .querySelectorAll('.nav button')
          .forEach((b) => (b.onclick = () => switchTab(b.dataset.tab)))
        document
          .querySelectorAll('.mobile-nav-btn')
          .forEach((b) => (b.onclick = () => switchTab(b.dataset.mobileTab)))
        syncMobileMenu()
      }
      init()
    </script>
  </body>
</html>
