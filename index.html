<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>League of Legends tracker</title>
    <link
      rel="icon"
      type="image/png"
      href="https://e7.pngegg.com/pngimages/752/220/png-clipart-league-of-legends-computer-icons-riot-games-league-of-legends-game-logo-thumbnail.png"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      :root {
        --bg: #090909;
        --panel: #121214;
        --panel2: #1a1a1f;
        --line: #2a2a32;
        --text: #f5f5f7;
        --muted: #9e9ea8;
        --gold: #ff5454;
        --green: #57f287;
        --red: #ff5b5b;
        --blue: #8ab4ff;
        --amber: #ff8a4c;
      }
      body {
        background:
          radial-gradient(
            circle at top,
            rgba(255, 55, 55, 0.08),
            transparent 24%
          ),
          linear-gradient(180deg, #0b0b0d, #090909);
        background-attachment: fixed;
        color: var(--text);
        padding-bottom: 84px;
      }
      .wrap {
        max-width: 1100px;
        margin: 0 auto;
        padding: 16px;
      }
      .header {
        position: sticky;
        top: 0;
        z-index: 20;
        background: rgba(10, 13, 20, 0.94);
        backdrop-filter: blur(12px);
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        padding: 12px 16px;
        margin: -16px -16px 16px;
        border-bottom: 1px solid rgba(255, 91, 91, 0.16);
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .brand-logo {
        width: 48px;
        height: 48px;
        border-radius: 14px;
        object-fit: cover;
        border: 1px solid rgba(255, 91, 91, 0.28);
        box-shadow: 0 0 18px rgba(255, 91, 91, 0.18);
      }
      .brand b {
        display: block;
        font-size: 18px;
        letter-spacing: 0.08em;
      }
      .brand span {
        display: none;
      }
      .header-actions {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }
      .menu-btn {
        display: none;
        width: 44px;
        height: 44px;
        border-radius: 14px;
        border: 1px solid rgba(255, 91, 91, 0.18);
        background: var(--panel);
        color: var(--text);
        align-items: center;
        justify-content: center;
        cursor: pointer;
        position: relative;
        z-index: 45;
      }
      .menu-btn svg {
        flex-shrink: 0;
      }
      .discord-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 14px;
        border-radius: 999px;
        border: 1px solid rgba(255, 91, 91, 0.22);
        background: linear-gradient(
          135deg,
          rgba(143, 16, 24, 0.92),
          rgba(255, 77, 77, 0.88)
        );
        color: #fff;
        font-size: 12px;
        font-weight: 900;
        letter-spacing: 0.04em;
        text-decoration: none;
        box-shadow: 0 8px 20px rgba(255, 77, 77, 0.16);
      }
      .discord-btn svg {
        flex-shrink: 0;
      }
      .chip {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 6px 10px;
        border-radius: 999px;
        background: var(--panel);
        border: 1px solid var(--line);
        font-size: 11px;
        font-weight: 800;
        text-align: center;
      }
      .chip.profile {
        min-width: auto;
        justify-content: center;
        gap: 8px;
        padding: 6px 14px;
        font-size: 13px;
      }
      .mini-select {
        appearance: none;
        background: var(--panel);
        color: var(--text);
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 10px 14px;
        font-size: 12px;
        font-weight: 800;
      }
      .icon-btn {
        width: 42px;
        height: 42px;
        border-radius: 999px;
        background: var(--panel);
        color: var(--text);
        border: 1px solid var(--line);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }
      .grid {
        display: grid;
        gap: 14px;
      }
      .g2 {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .g3 {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
      .g4 {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
      .card {
        background: linear-gradient(180deg, var(--panel), #0f1422);
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 16px;
      }
      .hero {
        border-color: rgba(215, 171, 82, 0.25);
        background:
          radial-gradient(
            circle at top right,
            rgba(248, 113, 113, 0.16),
            transparent 25%
          ),
          linear-gradient(135deg, #17120e, #101828);
      }
      .title {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        margin-bottom: 12px;
      }
      .title h2 {
        font-size: 13px;
        color: #ff6b6b;
        text-transform: uppercase;
        letter-spacing: 0.16em;
        font-variant-caps: all-small-caps;
      }
      .title span {
        font-size: 12px;
        color: var(--muted);
      }
      .hero h3 {
        font-size: 28px;
        line-height: 1.08;
        margin-bottom: 10px;
      }
      .hero p,
      .note,
      .meta,
      .small {
        font-size: 13px;
        color: var(--muted);
        line-height: 1.55;
      }
      .kpi {
        background: var(--panel2);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 14px;
      }
      .kpi .v {
        font-size: 28px;
        font-weight: 900;
      }
      .kpi .l {
        font-size: 11px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-top: 4px;
      }
      .hero-grid {
        display: grid;
        grid-template-columns: 1.4fr 0.6fr;
        gap: 16px;
        align-items: center;
      }
      .hero-mark {
        width: 100%;
        max-width: 280px;
        justify-self: end;
        border-radius: 24px;
        border: 1px solid rgba(248, 113, 113, 0.24);
        box-shadow: 0 0 30px rgba(248, 113, 113, 0.14);
      }
      .form {
        display: grid;
        grid-template-columns: repeat(12, minmax(0, 1fr));
        gap: 10px;
      }
      .f {
        display: grid;
        gap: 0;
        align-content: start;
      }
      .f label {
        font-size: 10px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 0;
        line-height: 1;
      }
      .compact-field label {
        align-self: start;
        padding-bottom: 0;
      }
      .f input,
      .f select,
      .f textarea {
        width: 100%;
        padding: 8px 10px;
        background: var(--panel2);
        border: 1px solid var(--line);
        border-radius: 12px;
        color: var(--text);
        font-size: 12px;
        outline: none;
        min-height: 38px;
        line-height: 1.2;
        margin-top: 0 !important;
      }
      .f input:not([type='checkbox']):not([type='radio']),
      .f select {
        height: 38px;
      }
      .compact-field input,
      .compact-field select {
        padding: 8px 10px;
        min-height: 38px;
        height: 38px;
        font-size: 12px;
      }
      .f textarea {
        min-height: 86px;
        height: auto;
        resize: vertical;
      }
      .f select[multiple] {
        min-height: 180px;
      }
      .s2 {
        grid-column: span 2;
      }
      .s3 {
        grid-column: span 3;
      }
      .s4 {
        grid-column: span 4;
      }
      .s5 {
        grid-column: span 5;
      }
      .s6 {
        grid-column: span 6;
      }
      .s8 {
        grid-column: span 8;
      }
      .s12 {
        grid-column: span 12;
      }
      .seg,
      .toggles,
      .bars,
      .list,
      .checks,
      .guide {
        display: grid;
        gap: 10px;
      }
      .seg {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .seg button,
      .nav button,
      .btn,
      .soft,
      .danger {
        cursor: pointer;
        border: none;
      }
      .seg button {
        padding: 14px;
        border-radius: 14px;
        background: var(--panel2);
        border: 2px solid var(--line);
        font-weight: 900;
        color: var(--muted);
      }
      .seg button.active.win {
        background: rgba(74, 222, 128, 0.1);
        border-color: rgba(74, 222, 128, 0.45);
        color: var(--green);
      }
      .seg button.active.loss {
        background: rgba(248, 113, 113, 0.1);
        border-color: rgba(248, 113, 113, 0.45);
        color: var(--red);
      }
      .toggles {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .toggle {
        min-height: 88px;
        padding: 12px;
        border-radius: 16px;
        background: var(--panel2);
        border: 2px solid var(--line);
      }
      .toggle .q {
        font-size: 12px;
        line-height: 1.35;
      }
      .toggle .a {
        font-size: 22px;
        font-weight: 900;
        color: var(--muted);
        margin-top: 10px;
      }
      .toggle.goodYes,
      .toggle.goodNo {
        border-color: rgba(74, 222, 128, 0.45);
        background: rgba(74, 222, 128, 0.08);
      }
      .toggle.goodYes .a,
      .toggle.goodNo .a {
        color: var(--green);
      }
      .toggle.badYes,
      .toggle.badNo {
        border-color: rgba(248, 113, 113, 0.45);
        background: rgba(248, 113, 113, 0.08);
      }
      .toggle.badYes .a,
      .toggle.badNo .a {
        color: var(--red);
      }
      .btn,
      .soft,
      .danger {
        padding: 12px 14px;
        border-radius: 12px;
        font-weight: 900;
      }
      .btn {
        background: linear-gradient(135deg, #8f1018, #ff4d4d);
        color: #fff;
      }
      .btn.cta {
        box-shadow: 0 10px 24px rgba(255, 77, 77, 0.22);
        transform: translateY(-1px);
      }
      .soft {
        background: var(--panel2);
        color: var(--text);
        border: 1px solid var(--line);
      }
      .danger {
        background: #2a1015;
        color: #ffc2c2;
        border: 1px solid #5a202b;
      }
      .checkGroup {
        padding: 12px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }
      .checkGroup h4 {
        font-size: 12px;
        color: var(--gold);
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
      .check {
        display: flex;
        gap: 10px;
        padding: 10px;
        border-radius: 12px;
      }
      .check.on {
        background: rgba(74, 222, 128, 0.08);
        border: 1px solid rgba(74, 222, 128, 0.18);
      }
      .dot {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        border: 2px solid var(--line);
        display: grid;
        place-items: center;
        flex: 0 0 auto;
        font-size: 11px;
        font-weight: 900;
        color: #06120a;
      }
      .check.on .dot {
        background: var(--green);
        border-color: var(--green);
      }
      .check b {
        font-size: 13px;
        display: block;
      }
      .check span {
        font-size: 11px;
        color: var(--muted);
        display: block;
        margin-top: 2px;
        line-height: 1.35;
      }
      .barRow {
        display: grid;
        gap: 6px;
      }
      .barHead {
        display: flex;
        justify-content: space-between;
        gap: 10px;
      }
      .barHead span:first-child {
        font-size: 13px;
      }
      .barHead span:last-child {
        font-size: 12px;
        color: var(--muted);
      }
      .barWrap {
        height: 10px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.06);
        overflow: hidden;
      }
      .bar {
        height: 100%;
        border-radius: 999px;
        background: linear-gradient(90deg, #d7ab52, #f2d48f);
      }
      .bar.green {
        background: linear-gradient(90deg, #34d399, #86efac);
      }
      .bar.red {
        background: linear-gradient(90deg, #fb7185, #fca5a5);
      }
      .bar.blue {
        background: linear-gradient(90deg, #60a5fa, #93c5fd);
      }
      .bar.amber {
        background: linear-gradient(90deg, #f59e0b, #fcd34d);
      }
      .game {
        padding: 14px;
        border-radius: 16px;
        background: var(--panel2);
        border: 1px solid var(--line);
      }
      .gameTop {
        display: grid;
        grid-template-columns: auto 1fr auto;
        gap: 12px;
        align-items: center;
      }
      .res {
        min-width: 76px;
        height: 48px;
        padding: 0 10px;
        border-radius: 14px;
        display: grid;
        place-items: center;
        font-size: 11px;
        font-weight: 900;
        text-align: center;
      }
      .res.win {
        background: rgba(74, 222, 128, 0.1);
        border: 1px solid rgba(74, 222, 128, 0.3);
        color: var(--green);
      }
      .res.loss {
        background: rgba(248, 113, 113, 0.1);
        border: 1px solid rgba(248, 113, 113, 0.3);
        color: var(--red);
      }
      .game h4 {
        font-size: 16px;
      }
      .game small {
        display: block;
        font-size: 12px;
        color: var(--muted);
        margin-top: 2px;
      }
      .score {
        font-size: 15px;
        font-weight: 900;
        color: var(--gold);
        text-align: right;
      }
      .score span {
        display: block;
        font-size: 11px;
        color: var(--muted);
      }
      .metaGrid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
        margin-top: 10px;
      }
      .meta {
        padding: 10px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }
      .guide {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .guide .card {
        padding: 14px;
      }
      .guide h4 {
        font-size: 13px;
        color: #ff6b6b;
        margin-bottom: 6px;
        font-variant-caps: all-small-caps;
        letter-spacing: 0.08em;
      }
      .match {
        padding: 12px;
        border-radius: 14px;
        background: var(--panel2);
        border: 1px solid var(--line);
        display: flex;
        justify-content: space-between;
        gap: 10px;
        align-items: center;
      }
      .match strong {
        font-size: 13px;
      }
      .match span {
        display: block;
        font-size: 11px;
        color: var(--muted);
        margin-top: 3px;
      }
      .resource {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        padding: 14px;
        border-radius: 16px;
        background: var(--panel2);
        border: 1px solid var(--line);
      }
      .sheet-toolbar {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
        margin-bottom: 14px;
      }
      .hidden-file {
        display: none;
      }
      .sheet-pills {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 14px;
      }
      .sheet-pill {
        padding: 8px 12px;
        border-radius: 999px;
        background: var(--panel2);
        border: 1px solid var(--line);
        color: var(--muted);
        cursor: pointer;
        font-size: 12px;
        font-weight: 800;
      }
      .sheet-pill.active {
        background: rgba(255, 91, 91, 0.1);
        border-color: rgba(255, 91, 91, 0.32);
        color: #ff8a8a;
      }
      .matchup-filters {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
        margin-bottom: 12px;
      }
      .matchup-filters .select-pill,
      .matchup-filters input {
        min-width: 160px;
      }
      .table-wrap {
        overflow: auto;
        border-radius: 16px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.02);
      }
      table.sheet-table {
        width: 100%;
        border-collapse: collapse;
        min-width: 760px;
      }
      .sheet-table th,
      .sheet-table td {
        padding: 14px 16px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        text-align: left;
        font-size: 14px;
        vertical-align: middle;
        line-height: 1.5;
      }
      .sheet-table th {
        position: sticky;
        top: 0;
        background: #15151b;
        color: #ff8a8a;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-size: 11px;
      }
      .matchup-champ {
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .matchup-champ img {
        width: 72px;
        height: 72px;
        border-radius: 16px;
        object-fit: cover;
        border: 1px solid rgba(255, 255, 255, 0.12);
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
      }
      .matchup-pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 90px;
        padding: 7px 14px;
        border-radius: 999px;
        font-size: 13px;
        font-weight: 900;
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
      .diff-1,
      .diff-2 {
        background: rgba(87, 242, 135, 0.12);
        color: #8cffb0;
      }
      .diff-3 {
        background: rgba(138, 180, 255, 0.12);
        color: #9fc3ff;
      }
      .diff-4 {
        background: rgba(255, 138, 76, 0.14);
        color: #ffb17c;
      }
      .diff-5,
      .diff-6,
      .diff-7,
      .diff-8,
      .diff-9,
      .diff-10 {
        background: rgba(255, 91, 91, 0.14);
        color: #ff8f8f;
      }
      .lane-top {
        background: rgba(195, 182, 255, 0.14);
        color: #d6ccff;
      }
      .lane-jg,
      .lane-jungle {
        background: rgba(87, 242, 135, 0.14);
        color: #93ffba;
      }
      .lane-mid,
      .lane-middle {
        background: rgba(138, 180, 255, 0.14);
        color: #a7c7ff;
      }
      .lane-bot,
      .lane-adc,
      .lane-bottom {
        background: rgba(255, 138, 76, 0.14);
        color: #ffc098;
      }
      .lane-supp,
      .lane-support,
      .lane-utility {
        background: rgba(255, 105, 180, 0.14);
        color: #ffb3d6;
      }
      .account {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        padding: 14px;
        border-radius: 16px;
        background: var(--panel2);
        border: 1px solid var(--line);
      }
      .account-main {
        display: flex;
        gap: 12px;
        align-items: center;
      }
      .account-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        align-items: center;
      }
      .rank-badge {
        width: 136px;
        height: 136px;
        object-fit: contain;
        transform: scale(1.45);
        transform-origin: center;
        filter: drop-shadow(0 0 18px rgba(255, 77, 77, 0.18));
      }
      .account .rank-badge {
        width: 52px;
        height: 52px;
      }
      #accountRankPreview {
        width: 160px;
        height: 160px;
      }
      #gRankPreview {
        width: 56px;
        height: 56px;
        object-fit: contain;
        transform: scale(1.35);
        transform-origin: center;
        filter: drop-shadow(0 2px 8px rgba(255, 77, 77, 0.3));
      }
      .tag {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 5px 10px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.08);
        font-size: 11px;
        color: var(--muted);
      }
      .tag.date {
        color: #ff9d5c;
      }
      .tag.win {
        color: var(--green);
      }
      .tag.loss {
        color: var(--red);
      }
      .tag.role {
        color: #c3b6ff;
      }
      .tag.rank {
        color: #ff6b6b;
      }
      .tag.metric {
        color: #9fd0ff;
      }
      .tag.mood-normal {
        color: #d1d5db;
      }
      .tag.mood-confiado {
        color: #60a5fa;
      }
      .tag.mood-emocionado {
        color: #fb7185;
      }
      .tag.mood-concentrado {
        color: #a78bfa;
      }
      .tag.mood-tilted {
        color: #ff5b5b;
      }
      .tag.mood-cansado {
        color: #94a3b8;
      }
      .tag.mood-ansioso {
        color: #f59e0b;
      }
      .tag.mood-frío {
        color: #67e8f9;
      }
      .tag.bool-yes {
        color: var(--green);
      }
      .tag.bool-no {
        color: var(--red);
      }
      .tag.lp-plus {
        color: var(--green);
      }
      .tag.lp-minus {
        color: var(--red);
      }
      .select-pill {
        appearance: none;
        background: var(--panel2);
        border: 1px solid var(--line);
        color: var(--text);
        padding: 10px 12px;
        border-radius: 999px;
        font-size: 12px;
      }
      .filters {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 12px;
      }
      .champ-row {
        display: grid;
        grid-template-columns: 1fr 56px;
        gap: 10px;
        align-items: center;
      }
      .champ-row.tight {
        max-width: 370px;
      }
      .champ-row.tier-only {
        max-width: 220px;
        grid-template-columns: 1fr;
        align-items: center;
        margin-top: 4px;
      }
      .champ-preview {
        width: 56px;
        height: 56px;
        border-radius: 14px;
        object-fit: cover;
        border: 1px solid var(--line);
      }
      .history-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
        margin-top: 10px;
      }
      .history-stat {
        padding: 10px 12px;
        border-radius: 14px;
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.04),
          rgba(255, 255, 255, 0.02)
        );
        border: 1px solid rgba(255, 255, 255, 0.06);
      }
      .history-stat b {
        display: block;
        font-size: 10px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.12em;
        margin-bottom: 5px;
      }
      .history-stat span {
        font-size: 13px;
        color: var(--text);
      }
      .pager {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        margin-top: 14px;
      }
      .pager-info {
        font-size: 12px;
        color: var(--muted);
      }
      .tips-wrap {
        display: grid;
        gap: 12px;
      }
      .tip-phase {
        border-radius: 18px;
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.03),
          rgba(255, 255, 255, 0.015)
        );
        border: 1px solid rgba(255, 255, 255, 0.06);
        overflow: hidden;
      }
      .tip-head {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        padding: 14px 16px;
        background: linear-gradient(
          90deg,
          rgba(143, 16, 24, 0.28),
          rgba(255, 77, 77, 0.06)
        );
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      }
      .tip-head h3 {
        font-size: 14px;
        letter-spacing: 0.12em;
        font-variant-caps: all-small-caps;
        color: #ff8f8f;
      }
      .tip-count {
        font-size: 11px;
        color: var(--muted);
      }
      .tip-list {
        display: grid;
        gap: 10px;
        padding: 14px;
      }
      .tip-item {
        padding: 12px 14px;
        border-radius: 14px;
        background: var(--panel2);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }
      .tip-top {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
        margin-bottom: 6px;
      }
      .tip-top strong {
        font-size: 13px;
        color: var(--text);
      }
      .tip-copy {
        font-size: 12px;
        line-height: 1.5;
        color: var(--muted);
      }
      .nav {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 30;
        background: rgba(10, 10, 12, 0.97);
        border-top: 1px solid rgba(255, 91, 91, 0.14);
        backdrop-filter: blur(12px);
      }
      .navIn {
        max-width: 1100px;
        margin: 0 auto;
        padding: 8px 10px calc(8px + env(safe-area-inset-bottom));
        display: grid;
        grid-template-columns: repeat(7, minmax(0, 1fr));
        gap: 4px;
      }
      .nav button {
        background: transparent;
        border-radius: 14px;
        padding: 10px 4px;
        color: var(--muted);
      }
      .nav button.active {
        background: rgba(255, 91, 91, 0.08);
        color: #ff8585;
      }
      .nav b {
        display: block;
        font-size: 18px;
        line-height: 1;
      }
      .nav span {
        display: block;
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .mobile-drawer {
        position: fixed;
        inset: 0;
        z-index: 40;
        display: none;
        background: rgba(4, 5, 8, 0.72);
        backdrop-filter: blur(8px);
      }
      .mobile-drawer.open {
        display: block;
      }
      .mobile-sheet {
        position: absolute;
        top: 14px;
        right: 14px;
        left: 14px;
        padding: 16px;
        border-radius: 22px;
        background: linear-gradient(180deg, #11131a, #0d1018);
        border: 1px solid rgba(255, 91, 91, 0.14);
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.45);
      }
      .mobile-sheet-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 14px;
      }
      .mobile-sheet-title {
        font-size: 12px;
        color: #ff8a8a;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        font-weight: 900;
      }
      .mobile-close {
        width: 38px;
        height: 38px;
        border-radius: 12px;
        border: 1px solid var(--line);
        background: var(--panel2);
        color: var(--text);
        cursor: pointer;
      }
      .mobile-profile {
        display: none;
        align-items: center;
        gap: 12px;
        padding: 12px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.06);
        margin-bottom: 14px;
      }
      .mobile-profile.show {
        display: flex;
      }
      .mobile-profile img {
        width: 50px;
        height: 50px;
        object-fit: contain;
        filter: drop-shadow(0 2px 10px rgba(255, 77, 77, 0.3));
      }
      .mobile-profile strong {
        display: block;
        font-size: 18px;
      }
      .mobile-profile span {
        display: block;
        margin-top: 2px;
        color: var(--muted);
        font-size: 12px;
      }
      .mobile-drawer-links {
        display: grid;
        gap: 10px;
      }
      .mobile-drawer-links button,
      .mobile-drawer-links a {
        width: 100%;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 14px;
        border-radius: 16px;
        text-decoration: none;
        font-weight: 900;
        font-size: 14px;
      }
      .mobile-drawer-links a {
        background: linear-gradient(
          135deg,
          rgba(143, 16, 24, 0.92),
          rgba(255, 77, 77, 0.88)
        );
        color: #fff;
        border: 1px solid rgba(255, 91, 91, 0.22);
      }
      .mobile-nav-btn {
        background: var(--panel2);
        color: var(--text);
        border: 1px solid var(--line);
        cursor: pointer;
      }
      .mobile-nav-btn.active {
        background: rgba(255, 91, 91, 0.1);
        border-color: rgba(255, 91, 91, 0.28);
        color: #ff9d9d;
      }
      .mobile-logout {
        display: none;
        margin-top: 12px;
        width: 100%;
      }
      .mobile-logout.show {
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .toast {
        position: fixed;
        top: 18px;
        right: 18px;
        left: auto;
        bottom: auto;
        transform: translateY(-20px);
        background: linear-gradient(135deg, #18181d, #23232b);
        color: var(--text);
        border: 1px solid rgba(255, 255, 255, 0.08);
        padding: 10px 18px;
        border-radius: 14px;
        font-size: 13px;
        font-weight: 900;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.28);
        transition:
          transform 0.2s,
          opacity 0.2s;
        z-index: 40;
        opacity: 0;
      }
      .toast.show {
        transform: translateY(0);
        opacity: 1;
      }
      .hidden {
        display: none;
      }
      /* VS BADGE */
      .vs-badge {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background: linear-gradient(135deg, #8f1018, #ff4d4d);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 8px;
        font-weight: 900;
        color: #fff;
        flex-shrink: 0;
        letter-spacing: 0.06em;
        box-shadow: 0 2px 10px rgba(255, 55, 55, 0.4);
        border: 1.5px solid rgba(255, 255, 255, 0.1);
      }
      /* LOGOUT BTN (see header consistent heights below) */
      /* ACCOUNT BUTTONS */
      .acc-use {
        padding: 7px 16px;
        border-radius: 999px;
        background: linear-gradient(135deg, #8f1018, #ff4d4d);
        color: #fff;
        font-size: 11px;
        font-weight: 800;
        border: none;
        cursor: pointer;
        white-space: nowrap;
        box-shadow: 0 4px 12px rgba(255, 55, 55, 0.2);
      }
      .acc-use:hover {
        box-shadow: 0 4px 18px rgba(255, 55, 55, 0.35);
      }
      .acc-icon {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: var(--panel2);
        border: 1px solid var(--line);
        color: var(--muted);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-size: 12px;
        flex-shrink: 0;
        transition: all 0.15s;
      }
      .acc-icon:hover {
        border-color: #aaa;
        color: var(--text);
      }
      .acc-del:hover {
        border-color: rgba(255, 91, 91, 0.5) !important;
        color: var(--red) !important;
        background: rgba(255, 91, 91, 0.08) !important;
      }
      /* CHAMP FIELD LABEL FIX */
      .champ-f {
        align-content: start !important;
      }
      .champ-f label {
        align-self: start;
        padding-bottom: 0;
      }
      #gDivisionWrap {
        align-content: start;
      }
      #gDivisionWrap label {
        align-self: start;
        padding-bottom: 0;
      }
      #gDivisionWrap select {
        margin-top: 4px;
      }
      /* ACCOUNT SWITCHER SELECT */
      .acc-switch {
        appearance: none;
        background: transparent;
        color: var(--text);
        border: none;
        font-size: 13px;
        font-weight: 800;
        cursor: pointer;
        outline: none;
        padding: 2px 4px;
        max-width: 200px;
      }
      /* HEADER CONSISTENT HEIGHTS */
      .logout-btn {
        height: 40px;
        padding: 0 16px;
        display: inline-flex;
        align-items: center;
        gap: 7px;
        border-radius: 999px;
        background: rgba(255, 91, 91, 0.08);
        border: 1px solid rgba(255, 91, 91, 0.2);
        color: #ff8585;
        font-size: 13px;
        font-weight: 800;
        cursor: pointer;
        transition: background 0.15s;
      }
      .logout-btn:hover {
        background: rgba(255, 91, 91, 0.16);
      }
      .chip.profile {
        height: 40px;
        padding: 0 14px 0 8px;
        align-items: center;
        gap: 8px;
        min-width: auto;
        font-size: 13px;
      }
      /* ACCOUNT CARD HOVER */
      .account {
        cursor: pointer;
        transition:
          border-color 0.2s,
          background 0.15s;
      }
      .account:not(.active):hover {
        border-color: rgba(255, 91, 91, 0.28);
        background: linear-gradient(
          180deg,
          rgba(255, 91, 91, 0.04),
          var(--panel2)
        );
      }
      .account.active {
        border-color: rgba(255, 91, 91, 0.45) !important;
        background: linear-gradient(
          180deg,
          rgba(255, 91, 91, 0.07),
          var(--panel2)
        ) !important;
      }
      .account.active:hover {
        border-color: rgba(255, 91, 91, 0.65) !important;
      }
      /* BOOL BOXES */
      .bool-boxes {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(82px, 1fr));
        gap: 6px;
        margin-top: 8px;
      }
      .bool-box {
        padding: 10px 6px;
        border-radius: 10px;
        text-align: center;
        border: 1px solid rgba(255, 255, 255, 0.06);
        background: rgba(255, 255, 255, 0.03);
      }
      .bb-icon {
        display: block;
        font-size: 18px;
        margin-bottom: 5px;
      }
      .bb-label {
        display: block;
        font-size: 10px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        line-height: 1.3;
      }
      .bb-good {
        background: rgba(74, 222, 128, 0.13);
        border-color: rgba(74, 222, 128, 0.28);
      }
      .bb-good .bb-label {
        color: #57f287;
      }
      .bb-bad {
        background: rgba(248, 113, 113, 0.12);
        border-color: rgba(248, 113, 113, 0.26);
      }
      .bb-bad .bb-label {
        color: #ff5b5b;
      }
      /* GUIDE CARDS */
      .guide-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }
      .guide-card {
        background: var(--panel2);
        border: 1px solid var(--line);
        border-radius: 16px;
        overflow: hidden;
        position: relative;
        transition: border-color 0.18s;
      }
      .guide-card:hover {
        border-color: rgba(255, 91, 91, 0.3);
      }
      .guide-thumb-wrap {
        position: relative;
        aspect-ratio: 16 / 9;
        background: #08080a;
        overflow: hidden;
      }
      .guide-thumb-wrap img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .guide-play-btn {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.42);
        opacity: 0;
        transition: opacity 0.18s;
        text-decoration: none;
        color: #fff;
        font-size: 38px;
      }
      .guide-card:hover .guide-play-btn {
        opacity: 1;
      }
      .guide-no-thumb {
        aspect-ratio: 16 / 9;
        background: linear-gradient(
          135deg,
          rgba(255, 91, 91, 0.07),
          rgba(143, 16, 24, 0.1)
        );
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 30px;
        text-decoration: none;
      }
      .guide-del-btn {
        position: absolute;
        top: 8px;
        right: 8px;
        width: 26px;
        height: 26px;
        border-radius: 50%;
        background: rgba(0, 0, 0, 0.65);
        border: none;
        color: #fff;
        font-size: 12px;
        cursor: pointer;
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 2;
        backdrop-filter: blur(4px);
      }
      .guide-card:hover .guide-del-btn {
        display: flex;
      }
      .guide-body {
        padding: 10px 12px 12px;
      }
      .guide-body-top {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        align-items: flex-start;
        margin-bottom: 5px;
      }
      .guide-title {
        font-size: 13px;
        font-weight: 700;
        line-height: 1.4;
        color: var(--text);
        flex: 1;
      }
      .guide-cat-badge {
        font-size: 9px;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        padding: 3px 8px;
        border-radius: 999px;
        white-space: nowrap;
        flex-shrink: 0;
      }
      .guide-notes {
        font-size: 11px;
        color: var(--muted);
        line-height: 1.45;
        margin-top: 5px;
      }
      .guide-url-preview {
        border-radius: 12px;
        overflow: hidden;
        display: none;
        margin-top: 8px;
        max-width: 320px;
      }
      .guide-url-preview.show {
        display: block;
      }
      .guide-url-preview img {
        width: 100%;
        display: block;
      }
      @media (max-width: 640px) {
        .guide-grid {
          grid-template-columns: 1fr;
        }
      }
      /* STAT COLOR CELLS */
      .stat-cells {
        display: grid;
        grid-template-columns: repeat(6, minmax(0, 1fr));
        gap: 6px;
        margin-top: 10px;
      }
      .stat-cell {
        padding: 8px 4px;
        border-radius: 10px;
        text-align: center;
        border: 1px solid rgba(255, 255, 255, 0.06);
        background: rgba(255, 255, 255, 0.03);
      }
      .sc-label {
        display: block;
        font-size: 9px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: rgba(255, 255, 255, 0.4);
        margin-bottom: 4px;
      }
      .sc-val {
        display: block;
        font-size: 17px;
        font-weight: 900;
        line-height: 1;
      }
      .sc-good {
        background: rgba(74, 222, 128, 0.13);
        border-color: rgba(74, 222, 128, 0.28);
      }
      .sc-good .sc-val {
        color: #57f287;
      }
      .sc-mid {
        background: rgba(255, 138, 76, 0.11);
        border-color: rgba(255, 138, 76, 0.24);
      }
      .sc-mid .sc-val {
        color: #ff8a4c;
      }
      .sc-bad {
        background: rgba(248, 113, 113, 0.12);
        border-color: rgba(248, 113, 113, 0.26);
      }
      .sc-bad .sc-val {
        color: #ff5b5b;
      }
      @media (max-width: 900px) {
        .g4,
        .g3,
        .g2,
        .guide,
        .hero-grid {
          grid-template-columns: 1fr;
        }
        .hero-mark {
          justify-self: start;
          max-width: 180px;
        }
        .s2,
        .s3,
        .s4,
        .s5,
        .s6,
        .s8,
        .s12 {
          grid-column: span 12;
        }
        .metaGrid,
        .toggles {
          grid-template-columns: 1fr;
        }
      }
      @media (max-width: 640px) {
        body {
          padding-bottom: 16px;
        }
        .header {
          position: sticky;
          display: flex;
          justify-content: center;
          align-items: center;
          min-height: 76px;
          padding: 14px 72px 14px 16px;
        }
        .brand {
          min-width: 0;
          justify-content: center;
          align-items: center;
          text-align: center;
        }
        .brand-logo {
          width: 42px;
          height: 42px;
          border-radius: 12px;
        }
        .brand b {
          font-size: 13px;
          line-height: 1.3;
          letter-spacing: 0.05em;
        }
        .header-actions {
          display: none;
        }
        .menu-btn {
          display: inline-flex;
          position: absolute;
          right: 16px;
          top: 50%;
          transform: translateY(-50%);
          flex-shrink: 0;
        }
        .nav {
          display: none;
        }
      }
    </style>
  </head>

      function load() {
        try {
          const raw = localStorage.getItem(KEY)
          if (raw) data = { ...data, ...JSON.parse(raw) }
          if (!Array.isArray(data.profile.pool))
            data.profile.pool = String(data.profile.pool || '')
              .split(',')
              .map((v) => v.trim())
              .filter(Boolean)
          if (!data.profile.server) data.profile.server = 'LAN'
          if (!Array.isArray(data.accounts)) data.accounts = []
          if (!Array.isArray(data.guides)) data.guides = []
          const existingIds = new Set(data.guides.map((g) => g.id))
          const missing = PREDEFINED_GUIDES.filter((g) => !existingIds.has(g.id))
          if (missing.length) data.guides = [...data.guides, ...missing.map((g) => ({ ...g }))]
        } catch {}
      }
      function save() {
        localStorage.setItem(KEY, JSON.stringify(data))

      function toast(t) {
        $('toast').textContent = t
        $('toast').classList.add('show')
        setTimeout(() => $('toast').classList.remove('show'), 1800)
      }
      function pct(a, b) {
        return b ? Math.round((a / b) * 100) : 0
      }
      function avg(arr) {
        return arr.length ? arr.reduce((a, b) => a + b, 0) / arr.length : 0
      }
      function fmtDur(sec) {
        const m = Math.floor(sec / 60) || 0
        const s = sec % 60 || 0
        return `${m}m ${String(s).padStart(2, '0')}s`
      }
      function createOptions(arr, selected = '') {
        return arr
          .map(
            (v) => `<option ${v === selected ? 'selected' : ''}>${v}</option>`
          )
          .join('')
      }
      function accountId(p) {
        return `${(p.gameName || '').toLowerCase()}#${(p.tagLine || '').toLowerCase()}@${p.server || 'LAN'}`
      }
      function hasActiveProfile() {
        return Boolean(data.profile?.gameName && data.profile?.tagLine)
      }
      function myGames() {
        const id = accountId(data.profile)
        return data.games.filter((g) => !g.accountId || g.accountId === id)
      }

        return `https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/ranked-emblem/emblem-${String(rank || 'iron').toLowerCase()}.png`

      function champImg(name) {
        if (!name)
          return 'https://res.cloudinary.com/dfr9zlu8d/image/upload/v1777329733/supro-logo_rvavuy.jpg'
        if (data.championImages?.[name]) return data.championImages[name]
        const key = name
          .replace(/[\s'.&]/g, '')
          .replace(/:/g, '')
          .replace(/-/g, '')
        return `https://ddragon.leagueoflegends.com/cdn/15.8.1/img/champion/${key}.png`
      }
      function moodClass(mood) {
        return `mood-${String(mood || '').toLowerCase()}`

        return `<span class="tag ${v ? 'bool-yes' : 'bool-no'}">${v ? goodText : badText}</span>`
      }
      function lpTag(result, lp) {
        const sign = result === 'win' ? '+' : '-'
        return `<span class="tag ${result === 'win' ? 'lp-plus' : 'lp-minus'}">${sign}${Math.abs(Number(lp) || 0)} LP</span>`
      }

              titleInput.placeholder = 'Nombre de la guía o video'
            } else {
              titleInput.placeholder = 'Nombre de la guía o video'
            }
          }
        } else if (preview) {
          preview.className = 'guide-url-preview'
          preview.innerHTML = ''
        }
      }
      function saveGuide() {
        const url = $('guideUrl')?.value.trim()
        const title = $('guideTitle')?.value.trim()
        const category = $('guideCat')?.value || 'general'
        const notes = $('guideNotes')?.value.trim()
        if (!url) return toast('Pega una URL primero')
        if (!title) return toast('Ponle un título')
        if (!Array.isArray(data.guides)) data.guides = []
        data.guides.push({ id: Date.now(), url, title, category, notes: notes || '' })
        save()
        $('guideUrl').value = ''
        $('guideTitle').value = ''
        $('guideNotes').value = ''
        const preview = $('guideUrlPreview')
        if (preview) { preview.className = 'guide-url-preview'; preview.innerHTML = '' }
        renderGuides()
        toast('Guía guardada')
      }
      function deleteGuide(id) {
        data.guides = (data.guides || []).filter((g) => g.id !== id)
        save()
        renderGuides()
      }
      function setGuideFilter(cat) {
        guideFilter = cat
        guidePage = 1
        renderGuides()
      }
      function changeGuidePage(next) {
        guidePage = next
        renderGuides()
      }
      function renderGuides() {
        const box = $('guidesContent')
        if (!box) return
        const guides = data.guides || []
        const catMap = Object.fromEntries(GUIDE_CATEGORIES.map((c) => [c.key, c]))
        const filtered =
          guideFilter === 'all'
            ? guides
            : guides.filter((g) => g.category === guideFilter)
        const perPage = 12
        const totalPages = Math.max(1, Math.ceil(filtered.length / perPage))
        if (guidePage > totalPages) guidePage = totalPages
        const start = (guidePage - 1) * perPage
        const pageItems = filtered.slice(start, start + perPage)
        const pills = `<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">
          <button class="sheet-pill ${guideFilter === 'all' ? 'active' : ''}" onclick="setGuideFilter('all')">Todas</button>
          ${GUIDE_CATEGORIES.map(
            (c) =>
              `<button class="sheet-pill ${guideFilter === c.key ? 'active' : ''}" onclick="setGuideFilter('${c.key}')">${c.label}</button>`
          ).join('')}
        </div>`
        const grid = pageItems.length
          ? `<div class="guide-grid">${pageItems
              .map((g) => {
                const thumb = ytThumb(g.url)
                const isYt = !!ytId(g.url)
                const cat = catMap[g.category] || { label: g.category, color: '#ff8585' }
                return `<div class="guide-card">
                  ${
                    isYt
                      ? `<div class="guide-thumb-wrap"><img src="${thumb}" alt="" loading="lazy"><a class="guide-play-btn" href="${g.url}" target="_blank" rel="noopener">▶</a></div>`
                      : `<a href="${g.url}" target="_blank" rel="noopener" class="guide-no-thumb">🔗</a>`
                  }
                  <button class="guide-del-btn" onclick="deleteGuide(${g.id})">✕</button>
                  <div class="guide-body">
                    <div class="guide-body-top">
                      <div class="guide-title">${g.title}</div>
                      <span class="guide-cat-badge" style="color:${cat.color};background:${cat.color}18;border:1px solid ${cat.color}30">${cat.label}</span>
                    </div>
                    ${g.notes ? `<div class="guide-notes">${g.notes}</div>` : ''}
                  </div>
                </div>`
              })
              .join('')}</div>`
          : '<div class="small" style="padding:8px 0">No hay guías en esta categoría todavía.</div>'
        const pager = filtered.length > perPage
          ? `<div style="display:flex;justify-content:center;align-items:center;gap:14px;margin-top:14px;padding-top:12px;border-top:1px solid rgba(255,255,255,.06)"><button class="acc-icon" onclick="changeGuidePage(${guidePage - 1})" ${guidePage === 1 ? 'disabled style="opacity:.3;cursor:default;pointer-events:none"' : ''}>←</button><span style="font-size:12px;color:var(--muted);font-weight:700;min-width:48px;text-align:center">${guidePage} / ${totalPages}</span><button class="acc-icon" onclick="changeGuidePage(${guidePage + 1})" ${guidePage === totalPages ? 'disabled style="opacity:.3;cursor:default;pointer-events:none"' : ''}>→</button></div>`
          : ''
        box.innerHTML = pills + grid + pager
      }
      function renderMatchups() {
        const box = $('matchupContent')
        if (!box) return
        if (!data.matchupSheets.length) {
          box.innerHTML =
            '<div class="small">Sube un archivo de Excel y cada hoja aparecerá aquí como un matchup separado.</div>'
          return
        }
        const current =
          data.matchupSheets.find(
            (sheet) => sheet.id === data.activeMatchupId
          ) || data.matchupSheets[0]
        if (current && data.activeMatchupId !== current.id) {
          data.activeMatchupId = current.id
          save()
        }
        const headers = current.rows?.[0] || []
        const bodyRows = current.rows?.slice(1) || []
        const headerKeys = headers.map((cell) =>
          String(cell ?? '')
            .toLowerCase()
            .normalize('NFD')
            .replace(/[\u0300-\u036f]/g, '')
            .trim()
        )
        const nameIndex = headerKeys.findIndex(
          (key) =>
            key.includes('champ') ||
            key.includes('campeon') ||
            key.includes('nombre')
        )
        const laneIndex = headerKeys.findIndex(
          (key) =>
            key.includes('linea') || key.includes('lane') || key.includes('rol')
        )
        const diffIndex = headerKeys.findIndex(
          (key) => key.includes('dific') || key.includes('difficulty')
        )
        const query = data.matchupFilters?.query || ''
        const laneFilter = data.matchupFilters?.lane || 'all'
        const diffFilter = data.matchupFilters?.diff || 'all'
        const filteredRows = bodyRows.filter((row) => {
          const nameText = String(
            nameIndex >= 0 ? (row?.[nameIndex] ?? '') : ''
          ).toLowerCase()
          const laneText = String(
            laneIndex >= 0 ? (row?.[laneIndex] ?? '') : ''
          ).toLowerCase()
          const diffText = String(
            diffIndex >= 0 ? (row?.[diffIndex] ?? '') : ''
          )
          const queryOk = !query || nameText.includes(query)
          const laneOk = laneFilter === 'all' || laneText === laneFilter
          const diffOk =
            diffFilter === 'all' ||
            String(Number.parseFloat(diffText) || '') === diffFilter
          return queryOk && laneOk && diffOk
        })
        const laneOptions = [
          ...new Set(
            bodyRows
              .map((row) =>
                String(laneIndex >= 0 ? (row?.[laneIndex] ?? '') : '').trim()
              )
              .filter(Boolean)
          ),
        ]
        const diffOptions = Array.from({ length: 9 }, (_, index) =>
          (1 + index * 0.5).toFixed(1).replace('.0', '')
        )
        const renderCell = (headerKey, value) => {
          const text = String(value ?? '').trim()
          if (!text) return ''
          if (headerKey.includes('champ') || headerKey.includes('campeon')) {
            return `<div class="matchup-champ" title="${text}"><img src="${champImg(text)}" alt="${text}"></div>`
          }
          if (headerKey.includes('dific') || headerKey.includes('difficulty')) {
            const rawLevel = Number.parseFloat(text) || 1
            const level = Math.max(1, Math.min(10, Math.ceil(rawLevel)))
            return `<span class="matchup-pill diff-${level}">${text}</span>`
          }
          if (
            headerKey.includes('linea') ||
            headerKey.includes('lane') ||
            headerKey.includes('rol')
          ) {
            const lane = text.toLowerCase()
            return `<span class="matchup-pill lane-${lane}">${text}</span>`
          }
          return `<div style="min-width:320px;line-height:1.7;white-space:pre-wrap">${text}</div>`
        }
        box.innerHTML = `
          <div class="sheet-pills">
            ${data.matchupSheets
              .map(
                (sheet) =>
                  `<button class="sheet-pill ${sheet.id === current.id ? 'active' : ''}" onclick="setActiveMatchup('${sheet.id}')">${sheet.sheetName}</button>`
              )
              .join('')}
          </div>
          <div class="matchup-filters">
            <input class="select-pill" id="matchupSearch" placeholder="Buscar campeón" value="${query.replace(/"/g, '&quot;')}" oninput="setMatchupSearch(this.value)">
            <select class="select-pill" id="matchupLaneFilter" onchange="setMatchupLaneFilter(this.value)">
              <option value="all">Todas las líneas</option>
              ${laneOptions.map((lane) => `<option value="${lane.toLowerCase()}" ${laneFilter === lane.toLowerCase() ? 'selected' : ''}>${lane}</option>`).join('')}
            </select>
            <select class="select-pill" id="matchupDiffFilter" onchange="setMatchupDiffFilter(this.value)">
              <option value="all">Todas las dificultades</option>
              ${diffOptions.map((diff) => `<option value="${diff}" ${diffFilter === diff ? 'selected' : ''}>${diff}</option>`).join('')}
            </select>
          </div>
          <div style="display:flex;justify-content:flex-end;margin-bottom:12px"><button class="danger" onclick="deleteMatchupSheet('${current.id}')">Eliminar</button></div>
          <div class="table-wrap">
            <table class="sheet-table">
              <thead>
                <tr>${headers.map((cell) => `<th>${cell ?? '—'}</th>`).join('')}</tr>
              </thead>
              <tbody>
                ${filteredRows
                  .map(
                    (row) =>
                      `<tr>${headers
                        .map(
                          (_, index) =>
                            `<td>${renderCell(headerKeys[index], row?.[index])}</td>`
                        )
                        .join('')}</tr>`
                  )
                  .join('')}
              </tbody>
            </table>
          </div>`
      }
      function setMatchupSearch(value) {
        data.matchupFilters.query = String(value || '').toLowerCase()
        save()
        renderMatchups()
        const input = $('matchupSearch')
        if (input) {
          input.focus()
          const len = input.value.length
          input.setSelectionRange?.(len, len)
        }
      }
      function setMatchupLaneFilter(value) {
        data.matchupFilters.lane = value
        save()
        renderMatchups()
      }
      function setMatchupDiffFilter(value) {
        data.matchupFilters.diff = value
        save()
        renderMatchups()
      }
      function setActiveMatchup(id) {
        data.activeMatchupId = id
        save()
        renderMatchups()
      }
      function deleteMatchupSheet(id) {
        data.matchupSheets = data.matchupSheets.filter(
          (sheet) => sheet.id !== id
        )
        if (data.activeMatchupId === id)
          data.activeMatchupId = data.matchupSheets[0]?.id || ''
        save()
        renderMatchups()
        toast('Hoja eliminada')
      }
      function clearMatchups() {
        if (!data.matchupSheets.length) return toast('No hay matchups cargados')
        if (!confirm('¿Borrar todas las hojas de matchups importadas?')) return
        data.matchupSheets = []
        data.activeMatchupId = ''
        save()
        renderMatchups()
        toast('Matchups borrados')
      }
      async function importMatchupWorkbook(event) {
        const file = event?.target?.files?.[0]
        if (!file) return
        if (typeof XLSX === 'undefined')
          return toast('No pude cargar el lector de Excel')
        try {
          const buffer = await file.arrayBuffer()
          const workbook = XLSX.read(buffer, { type: 'array' })
          const importedSheets = workbook.SheetNames.map((sheetName, index) => {
            const worksheet = workbook.Sheets[sheetName]
            const rows = XLSX.utils
              .sheet_to_json(worksheet, {
                header: 1,
                blankrows: false,
                defval: '',
              })
              .filter((row) =>
                row.some((cell) => String(cell ?? '').trim() !== '')
              )
            return {
              id: `${Date.now()}-${index}-${sheetName}`,
              workbookName: file.name,
              sheetName,
              rows,
            }
          }).filter((sheet) => sheet.rows.length)
          data.matchupSheets = [...data.matchupSheets, ...importedSheets]
          if (!data.activeMatchupId && importedSheets[0])
            data.activeMatchupId = importedSheets[0].id
          save()
          renderMatchups()
          event.target.value = ''
          toast(`${importedSheets.length} hojas importadas`)
        } catch {
          toast('No pude leer ese Excel')
        }
      }
      function applyImported(i) {
        const m = data.importedMatches[i]
        if (!m) return
        switchTab('partida')
        setResult(m.result || (m.info?.win ? 'win' : 'loss'))
        $('gDate').value = (
          m.date || new Date().toISOString().slice(0, 10)
        ).slice(0, 10)
        $('gChamp').value =
          m.champion || m.info?.championName || $('gChamp').value
        $('gEnemy').value =
          m.enemy || m.info?.enemyChampion || $('gEnemy').value
        $('gRole').value = m.role || m.info?.teamPosition || $('gRole').value
        $('gKills').value = m.kills ?? m.info?.kills ?? 0
        $('gDeaths').value = m.deaths ?? m.info?.deaths ?? 0
        $('gAssists').value = m.assists ?? m.info?.assists ?? 0
        $('gCs').value = m.csMin ?? m.info?.csMin ?? 0
        $('gWards').value = m.wards ?? m.info?.wardsPlaced ?? 0
        $('gPinks').value = m.pinks ?? m.info?.detectorWardsPlaced ?? 0
        const d = m.durationSec ?? m.info?.gameDuration ?? 0
        $('gDurMin').value = Math.floor(d / 60)
        $('gDurSec').value = d % 60
        toast('Campos autollenados')
      }
      function switchTab(tab) {
        if ((tab === 'partida' || tab === 'historial') && !hasActiveProfile())
          tab = 'importar'
        ;[
          'inicio',
          'partida',
          'importar',
          'historial',
          'matchups',
          'tips',
          'guias',
        ].forEach((t) => {
          $(`tab-${t}`).classList.toggle('hidden', t !== tab)
        })
        document
          .querySelectorAll('.nav button')
          .forEach((b) => b.classList.toggle('active', b.dataset.tab === tab))
        document
          .querySelectorAll('.mobile-nav-btn')
          .forEach((b) =>
            b.classList.toggle('active', b.dataset.mobileTab === tab)
          )
        toggleMobileMenu(false)
        if (tab === 'historial') renderHistory()
        if (tab === 'importar') renderImported()
        if (tab === 'matchups') renderMatchups()
        if (tab === 'guias') renderGuides()
      }
      function toggleMobileMenu(force) {
        const drawer = $('mobileDrawer')
        const trigger = document.querySelector('.menu-btn')
        if (!drawer) return
        const next =
          typeof force === 'boolean'
            ? force
            : !drawer.classList.contains('open')
        drawer.classList.toggle('open', next)
        if (trigger)
          trigger.setAttribute('aria-expanded', next ? 'true' : 'false')
      }
      function closeMobileMenu(event) {
        if (event?.target?.id === 'mobileDrawer') toggleMobileMenu(false)
      }
      function syncMobileMenu() {
        const profileBox = $('mobileProfile')
        const logoutBtn = $('mobileLogoutBtn')
        if (profileBox) {
          if (hasActiveProfile()) {
            profileBox.classList.add('show')
            profileBox.innerHTML = `<img src="${rankImg(data.profile.rank)}" alt=""><div><strong>${data.profile.gameName}#${data.profile.tagLine}</strong><span>${RANK_LABEL[data.profile.rank]}</span></div>`
          } else {
            profileBox.classList.remove('show')
            profileBox.innerHTML = ''
          }
        }
        if (logoutBtn) logoutBtn.classList.toggle('show', hasActiveProfile())
        document.querySelectorAll('.mobile-nav-btn').forEach((btn) => {
          const blocked =
            !hasActiveProfile() &&
            (btn.dataset.mobileTab === 'partida' ||
              btn.dataset.mobileTab === 'historial')
          btn.style.display = blocked ? 'none' : 'flex'
        })
      }
      function init() {
        load()
        renderBase()
        syncProfileInputs()
        seedInputs()
        renderQuick()
        renderDashboard()
        renderHistory()
        renderProgress()
        renderMatchups()
        renderAccounts()
        updateNavVisibility()
        fetchChampionList()
        document
          .querySelectorAll('.nav button')
          .forEach((b) => (b.onclick = () => switchTab(b.dataset.tab)))
        document
          .querySelectorAll('.mobile-nav-btn')
          .forEach((b) => (b.onclick = () => switchTab(b.dataset.mobileTab)))
        syncMobileMenu()
      }
      init()
    </script>
  </body>
</html>
